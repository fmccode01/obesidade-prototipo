function WeightJourneyChart({ years, preWeight, minWeight, minMonths, currentWeight, technique, regainPeak, regainPeakMonths, glp1Start, glp1StartMonths, compact }) {
  const [progress, setProgress] = useState(1); // 0-1 animation progress, start fully drawn
  const [animating, setAnimating] = useState(false);
  const animRef = useRef(null);

  const totalMonths = years * 12;

  // Build all timeline points (sorted by month)
  const allPoints = [
    { month: 0, weight: preWeight, label: 'cirurgia', kind: 'op' },
    { month: minMonths, weight: minWeight, label: 'mínimo', kind: 'min' },
    ...(regainPeak && regainPeakMonths ? [{ month: regainPeakMonths, weight: regainPeak, label: 'pico reganho', kind: 'peak' }] : []),
    ...(glp1Start && glp1StartMonths ? [{ month: glp1StartMonths, weight: glp1Start, label: 'início GLP-1', kind: 'glp1' }] : []),
    { month: totalMonths, weight: currentWeight, label: 'hoje', kind: 'now' }
  ].sort((a, b) => a.month - b.month);

  const animate = () => {
    if (animRef.current) cancelAnimationFrame(animRef.current);
    setAnimating(true);
    setProgress(0);
    const start = Date.now();
    const duration = 1800;
    const tick = () => {
      const elapsed = Date.now() - start;
      const t = Math.min(elapsed / duration, 1);
      // ease-out cubic
      const eased = 1 - Math.pow(1 - t, 3);
      setProgress(eased);
      if (t < 1) {
        animRef.current = requestAnimationFrame(tick);
      } else {
        setAnimating(false);
      }
    };
    animRef.current = requestAnimationFrame(tick);
  };

  // SVG dimensions
  const width = compact ? 320 : 360;
  const height = compact ? 170 : 200;
  const padding = { top: 22, right: 24, bottom: 28, left: 36 };
  const plotW = width - padding.left - padding.right;
  const plotH = height - padding.top - padding.bottom;

  // Scales
  const allWeights = allPoints.map(p => p.weight);
  const minW = Math.min(...allWeights);
  const maxW = Math.max(...allWeights);
  const padW = (maxW - minW) * 0.15 || 5;
  const yMin = minW - padW;
  const yMax = maxW + padW;

  const xScale = (m) => padding.left + (m / totalMonths) * plotW;
  const yScale = (w) => padding.top + ((yMax - w) / (yMax - yMin)) * plotH;

  // Build smooth path (quadratic curves between points)
  const buildPath = (pts) => {
    if (pts.length === 0) return '';
    let d = `M ${xScale(pts[0].month)} ${yScale(pts[0].weight)}`;
    for (let i = 1; i < pts.length; i++) {
      const prev = pts[i - 1];
      const curr = pts[i];
      const midX = (xScale(prev.month) + xScale(curr.month)) / 2;
      d += ` Q ${midX} ${yScale(prev.weight)} ${xScale(curr.month)} ${yScale(curr.weight)}`;
    }
    return d;
  };

  // For animation: compute visible path up to progress
  const visibleMonth = totalMonths * progress;
  const visiblePoints = allPoints.filter(p => p.month <= visibleMonth);
  // Add an interpolated end point if we're between two points
  if (progress < 1 && visiblePoints.length > 0 && visiblePoints.length < allPoints.length) {
    const lastVisible = visiblePoints[visiblePoints.length - 1];
    const nextPoint = allPoints[visiblePoints.length];
    if (nextPoint) {
      const segProgress = (visibleMonth - lastVisible.month) / (nextPoint.month - lastVisible.month);
      const interpW = lastVisible.weight + (nextPoint.weight - lastVisible.weight) * segProgress;
      visiblePoints.push({ month: visibleMonth, weight: interpW, interpolated: true });
    }
  }
  const fullPath = buildPath(allPoints);
  const visPath = buildPath(visiblePoints);

  // Y axis ticks
  const yTickCount = 4;
  const yTicks = Array.from({ length: yTickCount + 1 }, (_, i) => yMin + (yMax - yMin) * (i / yTickCount));

  // Background phases (visible based on progress)
  const phases = [
    { from: 0, to: minMonths, color: 'rgba(122, 144, 109, 0.08)', label: 'perda' },
    { from: minMonths, to: regainPeakMonths || totalMonths, color: 'rgba(122, 144, 109, 0.04)', label: 'manutenção' },
    ...(regainPeakMonths ? [{ from: regainPeakMonths, to: glp1StartMonths || totalMonths, color: 'rgba(184, 110, 78, 0.1)', label: 'reganho' }] : []),
    ...(glp1StartMonths ? [{ from: glp1StartMonths, to: totalMonths, color: 'rgba(125, 90, 124, 0.1)', label: 'GLP-1' }] : [])
  ];

  const totalLoss = preWeight - minWeight;
  const lossPct = (totalLoss / preWeight * 100).toFixed(1);
  const regain = currentWeight - minWeight;
  const regainPct = regain > 0 ? (regain / totalLoss * 100).toFixed(0) : 0;

  return (
    <div className="weight-journey">
      <div className="wj-head">
        <div>
          <div className="wj-title">Sua trajetória pós-cirurgia</div>
          <div className="wj-subtitle">{technique || 'cirurgia bariátrica'} · há {years === Math.round(years) ? years : years.toFixed(1)} {years === 1 ? 'ano' : 'anos'}</div>
        </div>
        <button className="wj-replay" onClick={animate} disabled={animating}>
          {animating ? '◐ animando' : '▶ animar'}
        </button>
      </div>

      <svg width={width} height={height} className="wj-svg" onClick={animate}>
        {/* Background phases */}
        {phases.map((ph, i) => {
          const visibleTo = Math.min(ph.to, visibleMonth);
          if (visibleTo <= ph.from) return null;
          return (
            <rect key={i}
              x={xScale(ph.from)}
              y={padding.top}
              width={xScale(visibleTo) - xScale(ph.from)}
              height={plotH}
              fill={ph.color} />
          );
        })}

        {/* Y grid */}
        {yTicks.map((t, i) => (
          <g key={`y${i}`}>
            <line x1={padding.left} y1={yScale(t)} x2={width - padding.right} y2={yScale(t)} stroke="rgba(31,27,22,0.05)" strokeWidth="1" />
            <text x={padding.left - 6} y={yScale(t) + 3} fontSize="9" fill="var(--ink-light)" textAnchor="end">{Math.round(t)}</text>
          </g>
        ))}

        {/* Y axis label */}
        <text x={padding.left - 28} y={padding.top + plotH / 2} fontSize="9" fill="var(--ink-light)" textAnchor="middle" transform={`rotate(-90 ${padding.left - 28} ${padding.top + plotH / 2})`}>kg</text>

        {/* X axis: month labels at key points */}
        {allPoints.map((p, i) => (
          <g key={`xl${i}`}>
            <line x1={xScale(p.month)} y1={padding.top + plotH} x2={xScale(p.month)} y2={padding.top + plotH + 3} stroke="var(--ink-light)" strokeWidth="1" />
            <text x={xScale(p.month)} y={padding.top + plotH + 14} fontSize="8.5" fill="var(--ink-light)" textAnchor="middle">
              {p.month === 0 ? '0' : p.month < 12 ? `${p.month}m` : `${(p.month / 12).toFixed(p.month % 12 === 0 ? 0 : 1)}a`}
            </text>
          </g>
        ))}

        {/* Faded full path (background) */}
        <path d={fullPath} stroke="var(--line-mid)" strokeWidth="1.5" fill="none" strokeDasharray="3,3" opacity="0.4" />

        {/* Active animated path */}
        <path d={visPath} stroke="var(--plum)" strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round" />

        {/* Phase labels (eyebrow) */}
        {phases.map((ph, i) => {
          const visibleTo = Math.min(ph.to, visibleMonth);
          if (visibleTo <= ph.from) return null;
          const midX = (xScale(ph.from) + xScale(visibleTo)) / 2;
          const phaseColor = ph.label === 'perda' ? 'var(--moss)' : ph.label === 'reganho' ? 'var(--rust)' : ph.label === 'GLP-1' ? 'var(--plum)' : 'var(--ink-light)';
          return (
            <text key={`pl${i}`} x={midX} y={padding.top + 11} fontSize="8.5" fill={phaseColor} textAnchor="middle" fontWeight="600" letterSpacing="0.06em" opacity="0.8">{ph.label.toUpperCase()}</text>
          );
        })}

        {/* Dots */}
        {allPoints.map((p, i) => {
          const visible = p.month <= visibleMonth || progress === 1;
          if (!visible) return null;
          const isOp = p.kind === 'op';
          const isMin = p.kind === 'min';
          const isNow = p.kind === 'now';
          const isPeak = p.kind === 'peak';
          const isGlp1 = p.kind === 'glp1';
          const color = isMin ? 'var(--moss)' : isPeak ? 'var(--rust)' : isGlp1 ? 'var(--plum)' : isNow ? 'var(--ink-deep)' : 'var(--ink-mid)';
          const r = isNow ? 6 : 4.5;
          // Label position: above for some, below for others (avoid collision)
          const labelAbove = isMin || isPeak;
          return (
            <g key={`pt${i}`}>
              <circle cx={xScale(p.month)} cy={yScale(p.weight)} r={r + 3} fill="white" />
              <circle cx={xScale(p.month)} cy={yScale(p.weight)} r={r} fill={color} />
              {isNow && <circle cx={xScale(p.month)} cy={yScale(p.weight)} r={r + 4} fill="none" stroke={color} strokeWidth="1.5" opacity="0.3" />}
              <text x={xScale(p.month)} y={yScale(p.weight) + (labelAbove ? -10 : 16)} fontSize="10" fill={color} textAnchor="middle" fontWeight="700">{p.weight.toFixed(1)}</text>
              <text x={xScale(p.month)} y={yScale(p.weight) + (labelAbove ? -22 : 27)} fontSize="8" fill="var(--ink-light)" textAnchor="middle" fontStyle="italic">{p.label}</text>
            </g>
          );
        })}
      </svg>

      <div className="wj-summary">
        <div className="wj-stat">
          <div className="wj-stat-eye">Perda máxima</div>
          <div className="wj-stat-val moss">{totalLoss.toFixed(1)} <span>kg · {lossPct}%</span></div>
        </div>
        {regain > 0 && (
          <div className="wj-stat">
            <div className="wj-stat-eye">Reganho</div>
            <div className="wj-stat-val rust">{regain.toFixed(1)} <span>kg · {regainPct}% do perdido</span></div>
          </div>
        )}
      </div>
      <div className="wj-foot">Toque no gráfico ou no botão pra reanimar.</div>
    </div>
  );
}

          </div>
        </div>
      ))}

      {allAnswered && (
        <div className={`score-reveal ${catCls}`}>
          <div className={`score-reveal-eye ${catKind}`}>Sua leitura</div>
          <div>
            <span className="score-reveal-val">{total}<span className="u">/48</span></span>
            <span className="score-reveal-cat" style={{color: catKind === 'moss' ? 'var(--moss)' : catKind === 'amber' ? '#8B6817' : 'var(--rust)',marginLeft:10,fontSize:11,fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase'}}>· {cat}</span>
          </div>
          <div className="score-reveal-text">
            {total < 14 && <>O screening não sugere compulsão alimentar clinicamente significativa. <strong>Bom sinal.</strong></>}
            {total >= 14 && total < 27 && <><strong>Padrão sugere compulsão leve a moderada.</strong> A Dra vai investigar com cuidado na consulta. Tratamentos existem e funcionam.</>}
            {total >= 27 && <><strong>Padrão sugere compulsão grave.</strong> Isso muda a estratégia — talvez precise de adjuvante específico além da medicação. Você não está sozinha.</>}
          </div>
        </div>
      )}
      {!allAnswered && (
        <div className="form-hint" style={{marginTop:10}}>{answered}/{ECAP_ITEMS.length} respondidos · o resultado aparece quando você completa.</div>
      )}
    </>
  );
}

function StepAnythingElse({ data, set }) {
  return (
    <>
      <div className="form-blurb">
        Esse é seu espaço aberto. Conte o que ainda não te perguntei e você acha importante a Dra saber antes da primeira conversa.
      </div>
      <div className="form-group">
        <label className="form-label">Algo mais que queira me contar?</label>
        <textarea className="form-textarea" value={data.anythingElse}
          onChange={e => set('anythingElse', e.target.value)}
          placeholder="Ex: um remédio específico que não estava na lista, uma alergia rara, algo sobre sua história, um receio sobre o tratamento..."
          style={{minHeight:140}}></textarea>
      </div>
      <div className="info-blurb">💚 Pode pular se não tiver nada. Esse espaço é seu.</div>
    </>
  );
}

function StepFinish({ data }) {
  const firstName = (data.name || '').split(' ')[0];
  const h = parseFloat(data.height) || 0;
  const w = parseFloat(data.weightCurrent) || 0;
  const imc = h && w ? (w / Math.pow(h / 100, 2)) : 0;
  const imcVal = imc.toFixed(1);
  const imcCls = imc < 25 ? 'eutrofia' : imc < 30 ? 'sobrepeso' : imc < 35 ? 'obesidade I' : imc < 40 ? 'obesidade II' : 'obesidade III';
  const imcClsKind = imc < 25 ? 'eutrofia' : imc < 30 ? 'sobrepeso' : 'obesidade';
  // pointer position 18-45 IMC range
  const imcPct = Math.max(0, Math.min(100, ((imc - 18) / (45 - 18)) * 100));

  const sm = data.sm || {};
  const reds = Object.values(sm).filter(v => v === 'red').length;
  const ambers = Object.values(sm).filter(v => v === 'amber').length;

  // FNQ score
  const fnqTotal = Object.values(data.fnq || {}).reduce((s, v) => s + (typeof v === 'number' ? v : 0), 0);
  const fnqAnswered = Object.keys(data.fnq || {}).length;
  const fnqLabel = fnqTotal <= 5 ? 'baixo' : fnqTotal <= 10 ? 'moderado' : fnqTotal <= 15 ? 'alto' : 'muito alto';
  const fnqColor = fnqTotal <= 10 ? 'var(--moss)' : fnqTotal <= 15 ? 'var(--amber)' : 'var(--rust)';

  // ECAP score
  const ecapTotal = Object.values(data.ecap || {}).reduce((s, v) => s + (typeof v === 'number' ? v : 0), 0);
  const ecapAnswered = Object.keys(data.ecap || {}).length;
  const ecapLabel = ecapTotal < 14 ? 'sem indicação' : ecapTotal < 27 ? 'leve/moderada' : 'grave';
  const ecapColor = ecapTotal < 14 ? 'var(--moss)' : ecapTotal < 27 ? 'var(--amber)' : 'var(--rust)';

  // Risk score: comorb + family + habits + IMC
  let riskScore = 0;
  riskScore += data.comorbidities.length * 2;
  riskScore += data.family.length;
  if (imc >= 30) riskScore += 3;
  else if (imc >= 25) riskScore += 1;
  if (data.activityFreq === 'sedentária') riskScore += 1;
  if (parseInt(data.sleepHours) < 6) riskScore += 1;
  if (parseInt(data.stress) >= 7) riskScore += 1;
  const risk = riskScore <= 4 ? 'baixo' : riskScore <= 9 ? 'moderado' : 'alto';

  const phenoCounts = Object.values(data.pheno || {}).reduce((acc, v) => { acc[v] = (acc[v] || 0) + 1; return acc; }, {});
  const dom = Object.entries(phenoCounts).sort((a, b) => b[1] - a[1])[0];

  return (
    <>
      <div className="dash-review-badge">
        <div className="dash-review-pulse"></div>
        <div className="dash-review-text">
          <strong>Seu caso está em revisão clínica</strong>
          <span>a equipe vai avaliar tudo e entrar em contato com os próximos passos</span>
        </div>
      </div>

      <div className="dash-greet">
        Pronto, <strong>{firstName}</strong>. Você abriu sua história — agora a gente lê com cuidado.
      </div>

      {/* Composição */}
      <div className="dash-section">
        <div className="dash-section-eye">Seu corpo</div>
        <div className="dash-card">
          <div className="dash-card-row">
            <span className="dash-card-label">Peso atual · altura</span>
            <span className="dash-card-value">{data.weightCurrent}<span className="u">kg</span> · {data.height}<span className="u">cm</span></span>
          </div>
          <div className="dash-card-row" style={{marginTop:8}}>
            <span className="dash-card-label">IMC</span>
            <span style={{display:'flex',alignItems:'center',gap:8}}>
              <span className="dash-card-value">{imcVal}</span>
              <span className={`imc-class-tag ${imcClsKind}`}>{imcCls}</span>
            </span>
          </div>
          <div className="imc-indicator">
            <div className="imc-bar"><div className="imc-pointer" style={{left:`${imcPct}%`}}></div></div>
          </div>
          {data.weightMax && parseFloat(data.weightMax) > w && (
            <div className="dash-card-context">Pico de <strong>{data.weightMax}kg</strong> — você já está {(parseFloat(data.weightMax) - w).toFixed(1)}kg abaixo. Isso conta.</div>
          )}
        </div>
      </div>

      {/* Risco metabólico */}
      <div className="dash-section">
        <div className="dash-section-eye">Risco metabólico</div>
        <div className="dash-card">
          <div className="dash-card-row">
            <span className="dash-card-label">Estimativa preliminar</span>
            <span className={`risk-tag ${risk}`}>{risk}</span>
          </div>
          <div className="dash-card-context">
            {risk === 'baixo' && <>Bom ponto de partida. Vamos preservar.</>}
            {risk === 'moderado' && <>Alguns sinais somando — janela boa para agir cedo.</>}
            {risk === 'alto' && <><strong>Seu corpo está pedindo atenção.</strong> É exatamente o perfil que mais ganha com tratamento estruturado.</>}
          </div>
        </div>
      </div>

      {/* Saúde + família */}
      <div className="dash-section">
        <div className="dash-section-eye">Sua história clínica</div>
        <div className="dash-card">
          <div className="dash-card-row">
            <span className="dash-card-label">Condições atuais</span>
            <span className="dash-card-value" style={{fontSize:15}}>{data.comorbidities.length || 'nenhuma'}</span>
          </div>
          <div className="dash-chips-readonly">
            {data.comorbidities.length > 0
              ? data.comorbidities.map(c => <span key={c} className="dash-chip-ro">{c}</span>)
              : <span className="dash-chip-ro empty">sem condições prévias relatadas</span>}
          </div>
          {data.medClasses && data.medClasses.length > 0 && (
            <>
              <div className="dash-card-row" style={{marginTop:10}}>
                <span className="dash-card-label">Medicações em uso · por classe</span>
                <span className="dash-card-value" style={{fontSize:15}}>{data.medClasses.length}</span>
              </div>
              <div className="dash-chips-readonly">
                {data.medClasses.map(m => <span key={m} className="dash-chip-ro">{m}</span>)}
              </div>
            </>
          )}
          {data.allergyList && data.allergyList.length > 0 && (
            <>
              <div className="dash-card-row" style={{marginTop:10}}>
                <span className="dash-card-label">Alergias</span>
                <span className="dash-card-value" style={{fontSize:15,color:'var(--rust)'}}>⚠️ {data.allergyList.length}</span>
              </div>
              <div className="dash-chips-readonly">
                {data.allergyList.map(a => <span key={a} className="dash-chip-ro" style={{borderColor:'var(--rust)',color:'var(--rust)'}}>{a}</span>)}
              </div>
            </>
          )}
          <div className="dash-card-row" style={{marginTop:10}}>
            <span className="dash-card-label">Histórico familiar</span>
            <span className="dash-card-value" style={{fontSize:15}}>{data.family.length} histórico{data.family.length !== 1 ? 's' : ''}</span>
          </div>
          {data.bariatric && (
            <div className="dash-card-context" style={{marginTop:8}}>🩺 Bariátrica registrada — vai pesar nas decisões da Dra.</div>
          )}
        </div>
      </div>

      {/* SentimentMap */}
      <div className="dash-section">
        <div className="dash-section-eye">Sua leitura emocional</div>
        <div className="dash-card">
          <div className="dash-card-row">
            <span className="dash-card-label">SentimentMap baseline</span>
            <span style={{fontSize:11,color:'var(--ink-light)'}}>
              {reds > 0 && <span style={{color:'var(--rust)',fontWeight:700}}>{reds}🔴</span>}
              {ambers > 0 && <span style={{color:'#8B6817',fontWeight:700,marginLeft:6}}>{ambers}🟡</span>}
            </span>
          </div>
          <div className="dash-sm-grid">
            {SM_DIMS.map(d => (
              <div key={d.k} className="dash-sm-cell">
                <div className="dash-sm-cell-icon">{d.icon}</div>
                <div className={`dash-sm-cell-light ${sm[d.k] || ''}`}></div>
                <div className="dash-sm-cell-label">{d.label.slice(0,4)}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Fenótipo */}
      <div className="dash-section">
        <div className="dash-section-eye">Como você come</div>
        <div className="dash-card">
          <div className="dash-card-row">
            <span className="dash-card-label">Padrão dominante</span>
            <span className="dash-card-value" style={{fontSize:15}}>{dom ? dom[0] : '—'}</span>
          </div>
          {dom && (
            <div className="dash-card-context">
              {(dom[0].includes('ansie') || dom[0].includes('emoc') || dom[0].includes('culpa') || dom[0].includes('belisc')) && <>Comer para regular emoção é fisiologia, não fraqueza. A medicação age justamente aqui.</>}
              {(dom[0].includes('craving') || dom[0].includes('doce') || dom[0].includes('estourar')) && <>Padrão que GLP-1 desliga bem. A pressão por doce costuma cair rápido.</>}
              {dom[0].includes('fome') && <>Fome constante geralmente é leptina/insulina desreguladas. A medicação age aí.</>}
              {(!dom[0].includes('ansie') && !dom[0].includes('emoc') && !dom[0].includes('culpa') && !dom[0].includes('belisc') && !dom[0].includes('craving') && !dom[0].includes('doce') && !dom[0].includes('estourar') && !dom[0].includes('fome')) && <>A Dra desenha estratégia a partir do seu padrão.</>}
            </div>
          )}
        </div>
      </div>

      {/* Ruído alimentar (FNQ) */}
      {fnqAnswered > 0 && (
        <div className="dash-section">
          <div className="dash-section-eye">Ruído alimentar <em style={{fontFamily:'Cormorant Garamond',fontStyle:'italic',fontWeight:400,color:'var(--ink-light)',marginLeft:4}}>(food noise)</em></div>
          <div className="dash-card" style={{borderLeft:'3px solid var(--plum)',paddingLeft:13}}>
            <div className="dash-card-row">
              <span className="dash-card-label">FNQ baseline</span>
              <span style={{display:'flex',alignItems:'center',gap:8}}>
                <span className="dash-card-value" style={{color:fnqColor}}>{fnqTotal}<span className="u">/20</span></span>
                <span style={{fontSize:10,color:fnqColor,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.08em'}}>{fnqLabel}</span>
              </span>
            </div>
            <div className="dash-fn-bar"><div className="dash-fn-pointer" style={{left:`${(fnqTotal/20)*100}%`}}></div></div>
            {fnqTotal >= 11 && (
              <div className="dash-card-context" style={{marginTop:8}}>GLP-1 costuma baixar 3-4 pontos em 12 semanas — você vai sentir antes de ver na balança.</div>
            )}
          </div>
        </div>
      )}

      {/* Compulsão alimentar (ECAP) - conditional */}
      {ecapAnswered > 0 && (
        <div className="dash-section">
          <div className="dash-section-eye">Compulsão alimentar (ECAP)</div>
          <div className="dash-card" style={{borderLeft:`3px solid ${ecapColor}`,paddingLeft:13}}>
            <div className="dash-card-row">
              <span className="dash-card-label">Screening · 16 itens</span>
              <span style={{display:'flex',alignItems:'center',gap:8}}>
                <span className="dash-card-value" style={{color:ecapColor}}>{ecapTotal}<span className="u">/48</span></span>
                <span style={{fontSize:10,color:ecapColor,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.08em'}}>{ecapLabel}</span>
              </span>
            </div>
            <div className="dash-card-context" style={{marginTop:6}}>
              {ecapTotal < 14 && 'Padrão clínico de compulsão não evidente. Bom sinal.'}
              {ecapTotal >= 14 && ecapTotal < 27 && 'A Dra investiga com cuidado na primeira conversa.'}
              {ecapTotal >= 27 && 'Padrão indica que estratégia precisa contemplar compulsão como eixo central.'}
            </div>
          </div>
        </div>
      )}

      {/* Objetivos */}
      <div className="dash-section">
        <div className="dash-section-eye">Onde você quer chegar</div>
        <div className="dash-card">
          <div className="dash-chips-readonly">
            {data.goals.length > 0
              ? data.goals.map(g => <span key={g} className="dash-chip-ro">{g}</span>)
              : <span className="dash-chip-ro empty">objetivos em aberto · a Dra constrói com você</span>}
          </div>
        </div>
      </div>

      {/* Tentativas anteriores */}
      <div className="dash-section">
        <div className="dash-section-eye">O que você já tentou</div>
        <div className="dash-card">
          {data.pastAttempts.length > 0 ? (
            <div style={{display:'flex',flexDirection:'column',gap:5}}>
              {data.pastAttempts.map(p => {
                const sat = data.pastSatisfaction?.[p] ?? 5;
                const satColor = sat <= 3 ? 'var(--rust)' : sat <= 5 ? 'var(--amber)' : sat >= 8 ? 'var(--moss)' : 'var(--ink-mid)';
                return (
                  <div key={p} style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,padding:'4px 0'}}>
                    <span style={{fontSize:12,color:'var(--ink-deep)',flex:1}}>{p}</span>
                    <span style={{
                      fontFamily:'Cormorant Garamond',fontStyle:'italic',
                      fontSize:14,color:satColor,fontWeight:500,whiteSpace:'nowrap'
                    }}>{sat}<span style={{fontSize:9,fontFamily:'Source Sans 3',fontStyle:'normal',color:'var(--ink-light)',marginLeft:1}}>/10</span></span>
                  </div>
                );
              })}
            </div>
          ) : (
            <div className="dash-chips-readonly">
              <span className="dash-chip-ro empty">primeira jornada estruturada</span>
            </div>
          )}
        </div>
      </div>

      {/* Hábitos */}
      <div className="dash-section">
        <div className="dash-section-eye">Sua rotina</div>
        <div className="dash-card">
          <div className="dash-card-row">
            <span className="dash-card-label">Atividade</span>
            <span style={{fontSize:13,fontWeight:600}}>{data.activityFreq || '—'}</span>
          </div>
          <div className="dash-card-row" style={{marginTop:5}}>
            <span className="dash-card-label">Estresse</span>
            <span style={{fontSize:13,fontWeight:600}}>{data.stress}/10</span>
          </div>
        </div>
      </div>

      {/* Histórico reprodutivo · feminino (com pregnancies + fertility) */}
      {data.sex === 'feminino' && (data.hasChildren || data.cycles || data.pregnancies || data.fertilityHistory) && (
        <div className="dash-section">
          <div className="dash-section-eye">Histórico reprodutivo · feminino</div>
          <div className="dash-card" style={{borderLeft:'3px solid var(--plum)',paddingLeft:13}}>
            {data.pregnancies && (
              <div className="dash-card-row">
                <span className="dash-card-label">Gestações</span>
                <span style={{fontSize:13,fontWeight:600}}>
                  {data.pregnancies} {data.pregnancies === '1' ? 'gestação' : 'gestações'}
                  {data.hasChildren && data.hasChildren !== 'no' && data.pregnancies !== (data.hasChildren === '3+' ? '3' : data.hasChildren) && (
                    <span style={{fontSize:10,color:'var(--rust)',marginLeft:6}}>· perdas detectadas</span>
                  )}
                </span>
              </div>
            )}
            {data.hasChildren && (
              <div className="dash-card-row" style={{marginTop:5}}>
                <span className="dash-card-label">Filhos vivos</span>
                <span style={{fontSize:13,fontWeight:600}}>

            )}
            {data.fertilityHistory && (
              <div className="dash-card-row" style={{marginTop:5}}>
                <span className="dash-card-label">Fertilidade</span>
                <span style={{fontSize:13,fontWeight:600,color:(data.fertilityHistory==='delayed'||data.fertilityHistory==='treatment-past'||data.fertilityHistory==='treatment-now')?'var(--rust)':'inherit'}}>

                   data.fertilityHistory === 'easy' ? 'tranquila' :
                   data.fertilityHistory === 'delayed' ? 'demorou >1 ano' :
                   data.fertilityHistory === 'treatment-past' ? 'fez tratamento' :
                   data.fertilityHistory === 'treatment-now' ? 'em tratamento agora' :
                   'planeja futuro'}
                </span>
              </div>
            )}
            {data.cycles && (
              <div className="dash-card-row" style={{marginTop:5}}>
                <span className="dash-card-label">Ciclos</span>
                <span style={{fontSize:13,fontWeight:600,color:data.cycles==='menopausa'?'var(--plum)':data.cycles==='irregulares'?'#8B6817':'inherit'}}>
                  {data.cycles}
                  {data.cycles === 'menopausa' && data.menopauseYears && ` · há ${data.menopauseYears} ${data.menopauseYears === '1' ? 'ano' : 'anos'}`}
                </span>
              </div>
            )}
            {data.cycles === 'menopausa' && (
              <div className="dash-card-context">
                Menopausa afeta distribuição de gordura, metabolismo basal e sensibilidade à insulina · vai pesar na estratégia.
              </div>
            )}
            {data.cycles === 'irregulares' && (
              <div className="dash-card-context">
                Ciclos irregulares + obesidade podem indicar SOP · investigação clínica recomendada.
              </div>
            )}
            {data.fertilityHistory === 'treatment-now' && (
              <div className="dash-card-context" style={{background:'var(--rust-bg)',color:'var(--rust)',fontWeight:600}}>
                ⚠️ Em tratamento de fertilidade · GLP-1 contraindicado durante tentativa de gestação e gestação. Estratégia será definida em consulta.
              </div>
            )}
            {data.pregnancies && parseInt(data.pregnancies) >= 3 && (
              <div className="dash-card-context">

              </div>

      {/* Histórico reprodutivo · masculino */}
      {data.sex === 'masculino' && (data.triedToHaveChildren || data.trtUse) && (
        <div className="dash-section">

              <div className="dash-card-row">

                   data.triedToHaveChildren === 'easy' ? 'sem dificuldade' :
                   data.triedToHaveChildren === 'delayed' ? 'demorou' :
                   data.triedToHaveChildren === 'treatment' ? 'fez tratamento' :
                   'tentando agora'}
                </span>
              </div>

              <div className="dash-card-row" style={{marginTop:5}}>

            {(data.triedToHaveChildren === 'delayed' || data.triedToHaveChildren === 'treatment') && (

              </div>
            )}
            {data.trtUse === 'current' && (
              <div className="dash-card-context">
                Em reposição · monitorar interação com perda de peso · perda significativa pode permitir reduzir dose.
              </div>
            )}
          </div>
        </div>
      )}


      {/* Sono · risk card */}
      {data.sleepHours && (() => {
        const h = parseFloat(data.sleepHours);
        const risk = h < 5 ? 'critical' : h < 6 ? 'high' : h < 7 ? 'warn' : h > 9 ? 'long' : 'ok';
        const riskColor = risk === 'critical' ? 'var(--rust)' : risk === 'high' ? '#8B4A1F' : risk === 'warn' ? '#8B6817' : risk === 'long' ? 'var(--ink-mid)' : 'var(--moss)';
        const riskLabel = risk === 'critical' ? 'muito risco' : risk === 'high' ? 'maior risco' : risk === 'warn' ? 'aviso' : risk === 'long' ? 'prolongado' : 'saudável';
        const snoringPositive = data.snoring === 'sim, frequente' || data.snoring === 'meu parceiro reclama';
        return (
          <div className="dash-section">
            <div className="dash-section-eye">Sono</div>
            <div className="dash-card" style={{borderLeft:`3px solid ${riskColor}`,paddingLeft:13}}>
              <div className="dash-card-row">
                <span className="dash-card-label">Média por noite</span>
                <span style={{display:'flex',alignItems:'center',gap:8}}>
                  <span className="dash-card-value" style={{color:riskColor}}>{data.sleepHours}<span className="u">h</span></span>
                  <span style={{fontSize:10,color:riskColor,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.08em'}}>{riskLabel}</span>
                </span>

function TrajectoryChart({ trajectory, agreedGoal, currentWeek }) {
  const [hover, setHover] = useState(null);
  const W = 360, H = 220;
  const padL = 32, padR = 22, padT = 22, padB = 30;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;

  const startKg = trajectory.startWeight;
  const targetKg = agreedGoal.targetKg;
  const allKgs = [...trajectory.measured.map(p => p.kg), ...trajectory.forecast.map(p => p.kg), targetKg, startKg];
  const minKg = Math.floor(Math.min(...allKgs) - 1);
  const maxKg = Math.ceil(Math.max(...allKgs) + 1);
  const rangeKg = maxKg - minKg || 1;

  const x = (w) => padL + (w / 52) * chartW;
  const y = (kg) => padT + ((maxKg - kg) / rangeKg) * chartH;

  const xTit = x(8), xResp = x(24), xEnd = x(52);

  const measuredPath = trajectory.measured.map((p, i) => `${i === 0 ? 'M' : 'L'}${x(p.w).toFixed(1)},${y(p.kg).toFixed(1)}`).join(' ');
  const forecastPath = trajectory.forecast.map((p, i) => `${i === 0 ? 'M' : 'L'}${x(p.w).toFixed(1)},${y(p.kg).toFixed(1)}`).join(' ');

  const ticks = [minKg, Math.round((minKg + maxKg) / 2), maxKg];

  return (
    <div className="traj-wrap">
      <div className="traj-head">
        <span className="traj-eye">Sua trajetória</span>
        <span className="traj-week">semana {currentWeek} de 52</span>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} className="traj-svg">
        {/* Phase backgrounds */}
        <rect x={padL} y={padT} width={xTit - padL} height={chartH} fill="var(--sienna)" opacity="0.06"/>
        <rect x={xTit} y={padT} width={xResp - xTit} height={chartH} fill="var(--moss)" opacity="0.07"/>
        <rect x={xResp} y={padT} width={xEnd - xResp} height={chartH} fill="var(--teal)" opacity="0.07"/>

        {/* Phase labels */}
        <text x={(padL + xTit) / 2} y={padT - 7} textAnchor="middle" fontSize="7.5" fill="var(--sienna)" fontWeight="700" letterSpacing="0.05em">TITULAÇÃO</text>
        <text x={(xTit + xResp) / 2} y={padT - 7} textAnchor="middle" fontSize="7.5" fill="var(--moss)" fontWeight="700" letterSpacing="0.05em">RESPOSTA</text>
        <text x={(xResp + xEnd) / 2} y={padT - 7} textAnchor="middle" fontSize="7.5" fill="var(--teal)" fontWeight="700" letterSpacing="0.05em">MANUTENÇÃO</text>

        {/* Y-axis ticks */}
        {ticks.map(kg => (
          <g key={kg}>
            <line x1={padL} y1={y(kg)} x2={padL + chartW} y2={y(kg)} stroke="var(--line-faint)" strokeWidth="0.5"/>
            <text x={padL - 4} y={y(kg) + 3} textAnchor="end" fontSize="9" fill="var(--ink-light)">{kg}</text>
          </g>
        ))}
        <text x={padL - 4} y={padT - 8} textAnchor="end" fontSize="8" fill="var(--ink-light)">kg</text>

        {/* X-axis ticks */}
        {[0, 12, 24, 36, 52].map(w => (
          <text key={w} x={x(w)} y={H - padB + 14} textAnchor="middle" fontSize="8.5" fill="var(--ink-light)">{w === 0 ? 'início' : `sem ${w}`}</text>
        ))}

        {/* Current week vertical line */}
        <line x1={x(currentWeek)} y1={padT} x2={x(currentWeek)} y2={padT + chartH} stroke="var(--ink-mid)" strokeWidth="0.7" strokeDasharray="2 2" opacity="0.4"/>

        {/* Target horizontal line */}
        <line x1={padL} y1={y(targetKg)} x2={padL + chartW} y2={y(targetKg)} stroke="var(--teal)" strokeWidth="1.4" strokeDasharray="5 3"/>
        <text x={padL + chartW + 2} y={y(targetKg) + 3} fontSize="9" fill="var(--teal)" fontWeight="700">{targetKg}</text>

        {/* Forecast curve (dashed) */}
        <path d={forecastPath} stroke="var(--moss-edge)" strokeWidth="1.5" strokeDasharray="3 3" fill="none" opacity="0.85"/>

        {/* Measured curve (solid) */}
        <path d={measuredPath} stroke="var(--ink-deep)" strokeWidth="1.8" fill="none"/>

        {/* Measured dots */}
        {trajectory.measured.map((p, i) => {
          const isLast = i === trajectory.measured.length - 1;
          return (
            <g key={i} style={{cursor: 'pointer'}}
              onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)}
              onClick={() => setHover(hover === i ? null : i)}>
              {isLast && <circle cx={x(p.w)} cy={y(p.kg)} r="11" fill="var(--moss)" opacity="0.18"/>}
              <circle cx={x(p.w)} cy={y(p.kg)} r={isLast ? 5 : 3.2}
                fill={isLast ? 'var(--moss)' : 'white'}
                stroke={isLast ? 'var(--moss)' : 'var(--ink-deep)'}
                strokeWidth="1.5"/>
              {/* invisible hit area */}
              <circle cx={x(p.w)} cy={y(p.kg)} r="12" fill="transparent"/>
            </g>
          );
        })}

        {/* Tooltip */}
        {hover !== null && trajectory.measured[hover] && (() => {
          const p = trajectory.measured[hover];
          const tx = x(p.w);
          const ty = y(p.kg);
          const above = ty > padT + 40;
          const ty2 = above ? ty - 38 : ty + 14;
          return (
            <g style={{pointerEvents: 'none'}}>
              <rect x={tx - 30} y={ty2} width="60" height="28" fill="var(--ink-deep)" rx="5"/>
              <text x={tx} y={ty2 + 11} textAnchor="middle" fontSize="8.5" fill="rgba(255,255,255,0.7)" fontWeight="700" letterSpacing="0.08em">SEM {p.w}</text>
              <text x={tx} y={ty2 + 22} textAnchor="middle" fontSize="11" fill="white" fontWeight="700">{p.kg} kg</text>
            </g>
          );
        })()}
      </svg>
      <div className="traj-legend">
        <span className="traj-leg-item"><span className="traj-dot measured"></span>realizado</span>
        <span className="traj-leg-item"><span className="traj-dash forecast"></span>previsto</span>
        <span className="traj-leg-item"><span className="traj-dash target"></span>meta</span>
      </div>
    </div>
  );
}

function MetaCard({ goal, startWeight, currentWeight }) {
  const lossKg = (startWeight - currentWeight);
  const totalNeeded = startWeight - goal.targetKg;
  const remainKg = (currentWeight - goal.targetKg);
  const lossPct = ((lossKg / startWeight) * 100);
  const progressPct = totalNeeded > 0 ? Math.max(0, Math.min(100, (lossKg / totalNeeded) * 100)) : 0;
  const reached = remainKg <= 0;
  const [byDate, byMonth] = goal.byWhen.split(' · ');
  return (
    <div className="meta-card">
      <div className="meta-card-eye">Meta acordada</div>
      <div className="meta-card-grid">
        <div className="meta-card-cell">
          <div className="meta-card-cell-val">{goal.targetKg}<span className="u">kg</span></div>
          <div className="meta-card-cell-lbl">peso alvo</div>
        </div>
        <div className="meta-card-cell">
          <div className="meta-card-cell-val">−{goal.targetPct}<span className="u">%</span></div>
          <div className="meta-card-cell-lbl">redução</div>
        </div>
        <div className="meta-card-cell">
          <div className="meta-card-cell-val" style={{fontSize:14,fontStyle:'italic'}}>{byMonth || byDate}</div>
          <div className="meta-card-cell-lbl">prazo</div>
        </div>
      </div>
      <div className="meta-card-progress">
        <div className="meta-card-progress-bar">
          <div className="meta-card-progress-fill" style={{width: `${progressPct}%`}}></div>
        </div>
        <div className="meta-card-progress-text">
          <strong>{lossPct.toFixed(1)}%</strong> percorrido · {reached ? <strong style={{color:'var(--teal)'}}>meta atingida</strong> : <>{remainKg.toFixed(1)} kg até a meta</>}
        </div>
      </div>
      <div className="meta-card-func">
        <span className="meta-card-func-icon">💚</span>
        <span className="meta-card-func-text">"{goal.functional}"</span>
      </div>
      <div className="meta-card-meta">Acordada na {goal.agreedOn}</div>
    </div>
  );
}

function PCSection({ eyeText, intro, warning, warningKind, meds, selectedKeys, doses, onToggle, onDose }) {
  return (
    <div className="pc-section">
      <div className="pc-section-eye">{eyeText}</div>
      {intro && <p className="pc-section-intro">{intro}</p>}
      {warning && (
        <div className={`pc-warning ${warningKind === 'amber' ? 'amber' : ''}`}
          dangerouslySetInnerHTML={{__html: warning}}></div>
      )}
      <div className="pc-med-list">
        {meds.map(m => {
          const selected = selectedKeys.includes(m.k);
          const flagCls = m.flag === 'narrow' ? 'narrow' : (m.flag ? 'flagged' : '');
          return (
            <div key={m.k}>
              <button className={`pc-med-chip ${selected ? 'selected' : ''} ${flagCls}`}
                onClick={() => onToggle(m.k)}>
                <span>{m.label}</span>
                {m.flag && <span className="pc-med-warn-icon">⚠️</span>}
              </button>
              {selected && m.flag && (
                <div className={`pc-med-flag-text ${m.flag === 'narrow' ? 'narrow' : ''}`}>⚠️ {m.flagText}</div>
              )}
              {selected && (
                <div className="pc-med-dose">
                  <input type="text" className="form-input"
                    placeholder={m.k === 'insulin' ? 'Tipo + dose total/dia (ex: NPH 30U manhã + Lantus 20U noite)' :
                                 m.k === 'sulfo' ? 'Qual + dose (ex: gliclazida 60mg 1x/dia)' :
                                 'Dose (ex: 50mg 1x/dia)'}
                    value={doses[m.k] || ''}
                    onChange={e => onDose(m.k, e.target.value)} />

              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function PreConsultSafety() {
  const p = PRECONSULT_PATIENT;
  const [data, setData] = useState({
    diabetes: { meds: [], doses: {} },
    htn: { meds: [], doses: {} },
    statin: { name: '', dose: '' },
    contraception: { type: '', name: '' },
    critical: { meds: [], doses: {} },
    pregnancy: { status: '' },
    allergyDetails: {},
    mh: { phq2: {}, gad2: {} }
  });
  const [submitted, setSubmitted] = useState(false);

  const set = (path, val) => {
    const parts = path.split('.');
    setData(d => {
      const nd = { ...d };
      let ref = nd;
      for (let i = 0; i < parts.length - 1; i++) {
        ref[parts[i]] = { ...ref[parts[i]] };
        ref = ref[parts[i]];
      }
      ref[parts[parts.length - 1]] = val;
      return nd;
    });
  };
  const toggleArr = (path, val) => {
    const parts = path.split('.');
    const current = parts.reduce((o, k) => o[k], data);
    const next = current.includes(val) ? current.filter(x => x !== val) : [...current, val];
    set(path, next);
  };

  const showDiabetes = p.medClasses.includes('Para diabetes / glicemia');
  const showHtn = p.medClasses.includes('Para pressão alta');
  const showStatin = p.medClasses.includes('Para colesterol (estatinas)');
  const showContraception = p.medClasses.includes('Anticoncepcional / TRH');
  const showPregnancy = p.sex === 'feminino' && p.age < 50;
  const showAllergy = p.allergyList.length > 0;

  const hypoRisk = data.diabetes.meds.includes('insulin') || data.diabetes.meds.includes('sulfo');
  const betaBlockerMask = data.htn.meds.includes('atenolol') || data.htn.meds.includes('meto_succ');
  const oralContra = data.contraception.type === 'Pílula oral combinada' || data.contraception.type === 'Pílula oral progesterona' || data.contraception.type === 'TRH oral';
  const pregnancyRisk = data.pregnancy.status === 'Estou grávida' || data.pregnancy.status === 'Planejo nos próximos 12 meses';
  const narrowMeds = data.critical.meds.filter(k => {
    const m = CRITICAL_MEDS.find(x => x.k === k);
    return m && m.flag === 'narrow';
  });

  // Mental health screening totals
  const phq2Total = Object.values(data.mh.phq2).reduce((s, v) => s + (typeof v === 'number' ? v : 0), 0);
  const gad2Total = Object.values(data.mh.gad2).reduce((s, v) => s + (typeof v === 'number' ? v : 0), 0);
  const phq2Pos = phq2Total >= 3;
  const gad2Pos = gad2Total >= 3;
  const phq2Answered = Object.keys(data.mh.phq2).length === PHQ_2_ITEMS.length;
  const gad2Answered = Object.keys(data.mh.gad2).length === GAD_2_ITEMS.length;

  const totalFlags = (hypoRisk ? 1 : 0) + (oralContra ? 1 : 0) + (pregnancyRisk ? 1 : 0) + narrowMeds.length + (betaBlockerMask && hypoRisk ? 1 : 0) + (phq2Pos ? 1 : 0) + (gad2Pos ? 1 : 0);
  const scheduledTasks = (phq2Pos ? 1 : 0) + (gad2Pos ? 1 : 0);

  if (submitted) {
    return (
      <div className="preconsult-wrap">
        <div style={{padding:'60px 0',textAlign:'center'}}>
          <div style={{fontSize:48,marginBottom:18}}>✓</div>
          <div className="preconsult-eye" style={{textAlign:'center'}}>ENVIADO</div>
          <h2 className="preconsult-title" style={{textAlign:'center'}}>Pronto, <em>{p.name.split(' ')[0]}</em>.</h2>
          <p className="preconsult-intro" style={{maxWidth:300,margin:'0 auto'}}>
            A Dra vai ler tudo antes da consulta — incluindo {totalFlags > 0 ? <><strong>{totalFlags} ponto{totalFlags > 1 ? 's' : ''} de atenção</strong> que identificamos</> : 'cada detalhe que você marcou'}. Sua consulta começa onde você está.
          </p>
          <button className="pc-submit-btn" style={{marginTop:24,maxWidth:200}} onClick={() => setSubmitted(false)}>Voltar e revisar</button>
        </div>
      </div>
    );
  }

  return (
    <div className="preconsult-wrap">
      <div className="preconsult-header">
        <div className="preconsult-eye">PRÉ-CONSULTA · SEGURANÇA</div>
        <h2 className="preconsult-title">Olá, <em>{p.name.split(' ')[0]}</em></h2>
        <p className="preconsult-intro">
          Você já preencheu o onboarding. Pra começar com segurança, a Dra precisa de detalhes adicionais sobre suas medicações — <strong>só os relevantes pro seu perfil</strong>. Algumas combinações com GLP-1 exigem ajuste fino.
        </p>
      </div>

      <div className="pc-profile-card">
        <div className="pc-profile-eye">SEU PERFIL ATÉ AQUI</div>
        <div className="pc-profile-row"><span>idade · sexo</span><strong>{p.age} anos · {p.sex}</strong></div>
        <div className="pc-profile-row"><span>condições</span><strong>{p.comorbidities.join(' · ')}</strong></div>
        <div className="pc-profile-row"><span>medicações</span><strong>{p.medClasses.length} classes selecionadas</strong></div>
        <div className="pc-profile-row"><span>alergias</span><strong>{p.allergyList.length > 0 ? p.allergyList.join(', ') : 'nenhuma'}</strong></div>

      {showDiabetes && (

                <li><s>Quiz pra ganhar pontos</s> · sem gamificação ponderal-like.</li>
                <li><s>Conteúdo genérico</s> · todo conteúdo passa por segmentação.</li>
                <li><s>Educação moralizante</s> · não diz "você deveria".</li>
                <li><s>Tarefa obrigatória</s> · não conta como adesão. Sem cobrança.</li>
                <li><s>Substituto de consulta</s> · contextualiza, não orienta clinicamente.</li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

                <div className="trigger-cluster plum">
                  <div className="trigger-cluster-tag">Fertilidade demorou + ciclos irregulares</div>
                  <div className="trigger-cluster-body">
                    <div><strong>Suspeita forte de SOP</strong> · critérios de Rotterdam · pedir USG + andrógenos</div>
                    <div><strong>Tratamento dual:</strong> GLP-1 + metformina podem ser sinérgicos · perda de 5-10% restaura ovulação em ~80% dos casos</div>
                    <div><strong>Coordenação:</strong> articular com endócrino-ginecologista se planeja gestar</div>
                  </div>
                </div>
                <div className="trigger-cluster plum">
                  <div className="trigger-cluster-tag">Menopausa + ≥2 gestações</div>
                  <div className="trigger-cluster-body">
                    <div><strong>Combinação aditiva:</strong> set point elevado por gestações + queda metabólica menopausal</div>
                    <div><strong>Risco CV elevado</strong> · pedir painel lipídico + HbA1c + considerar DEXA</div>
                    <div><strong>Estratégia:</strong> GLP-1 + treinamento de força + considerar TRH se sintomas vasomotores</div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          {/* Sub 4 · Masculino */}
          <div className="trigger-dim">
            <div className="trigger-dim-head">
              <span className="trigger-dim-num">4</span>
              <div>
                <div className="trigger-dim-title">Eixo reprodutivo masculino · breve mas importante</div>
                <div className="trigger-dim-sub">Obesidade masculina e testosterona se influenciam mutuamente</div>
              </div>
            </div>
            <div className="trigger-dim-body">
              <p>Obesidade masculina associa-se com <strong>hipogonadismo funcional</strong>: tecido adiposo abdominal eleva aromatase (converte testosterona em estradiol), reduz secreção pulsátil de GnRH no hipotálamo, gera resistência à leptina central. Resultado: queda de testosterona, redução de libido, qualidade espermática reduzida, disfunção erétil.</p>
              <p>2 perguntas curtas no onboarding masculino capturam o essencial:</p>
              <div className="trigger-example">
                <div className="trigger-example-eye">PERGUNTAS DA SEÇÃO MASCULINA</div>
                <ul>
                  <li><strong>"Já tentou ter filhos com dificuldade?"</strong> · 5 opções (não tentou · sem dificuldade · demorou · fez tratamento · tentando agora)</li>
                  <li><strong>"Já usou reposição de testosterona?"</strong> · 4 opções (não · já usou · em uso · avaliando)</li>
                </ul>
              </div>
              <div className="trigger-note">Em obesidade masculina, <strong>perda de 10% do peso frequentemente recupera testosterona endógena</strong> · pode evitar necessidade de reposição. Se já está em reposição, é importante saber dose e tempo · interage com composição corporal e resposta ao GLP-1. Quem está avaliando TRT pode se beneficiar de fazer dosagem hormonal antes de decidir.</div>
            </div>
          </div>

          {/* Limites éticos */}
          <div className="trigger-limits">
            <div className="trigger-limits-eye">CONSIDERAÇÕES ÉTICAS E DE PRIVACIDADE</div>
            <ul>
              <li><strong>Sensibilidade do tema:</strong> perguntas sobre fertilidade tocam em luto, ansiedade, identidade · linguagem cuidadosa é essencial. Sistema usa <em>"pesquisa de fertilidade"</em> em vez de <em>"infertilidade"</em>, deixa opção "nunca tentei" sempre disponível.</li>
              <li><strong>Não obrigatório:</strong> paciente pode pular qualquer pergunta · não bloqueia o onboarding · a Dra retoma na consulta se faz sentido.</li>
              <li><strong>Mulheres trans e homens trans:</strong> seleção por sexo biológico não tem como objetivo invalidar identidade · pergunta clínica é sobre o eixo hormonal endógeno e história obstétrica. A consulta abre espaço para identidade de gênero separadamente.</li>
              <li><strong>Não usar isoladamente pra prescrever:</strong> dado de onboarding é hipótese · confirmação clínica (exames, USG, dosagens) sempre necessária antes de mudanças de protocolo.</li>
              <li><strong>Pacientes em tentativa de gestação:</strong> GLP-1 contraindicado · sistema sinaliza visualmente · estratégia individualizada na primeira consulta.</li>
            </ul>
          </div>
        </div>

        {/* Cadências fixas */}
        <div className="av-section">
          <div className="av-section-eye">Cadências</div>
          <h2 className="av-section-title">Cadências <em>fixas</em></h2>
          <div className="av-section-sub">Capturas proativas no tempo · independem de gatilho.</div>
          <table className="cad-table">
            <thead>
              <tr>
                <th>Item</th>
                <th>Cadência</th>
                <th>Fase aplicável</th>
                <th>Canal</th>
              </tr>
            </thead>
            <tbody>
              {CADENCES_FIXED.map((c, i) => (
                <tr key={i}>
                  <td><span className="ic">{c.ic}</span>{c.name}</td>
                  <td>{c.when}</td>
                  <td>{c.phase}</td>
                  <td>{c.channel}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        {/* Ausência */}
        <div className="av-section">
          <div className="av-section-eye">Silêncio</div>
          <h2 className="av-section-title">Ausência <em>detectada</em></h2>
          <div className="av-section-sub">Quando o paciente para de se manifestar · escalação progressiva.</div>
          <table className="cad-table">
            <thead>
              <tr>
                <th>Silêncio</th>
                <th>Ação</th>
                <th>Canal</th>
              </tr>
            </thead>
            <tbody>
              {ABSENCE_TRIGGERS.map((a, i) => (
                <tr key={i}>
                  <td>{a.silence}</td>
                  <td>{a.action}</td>
                  <td>{a.channel}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        {/* Caminhos clínicos */}
        <div className="av-section">
          <div className="av-section-eye">Caminhos clínicos</div>
          <h2 className="av-section-title">Algoritmos <em>de decisão</em></h2>
          <div className="av-section-sub">Fluxos estruturados para os 6 cenários clínicos mais frequentes · cada caminho é uma referência, não um protocolo rígido.</div>
          <div className="pathway-grid">
            {PATHWAYS.map(pw => (
              <div key={pw.id} className="pathway-card">
                <h3 className="pathway-title">{pw.title}</h3>
                <div className="pathway-trigger"><strong>Gatilho:</strong> {pw.trigger}</div>
                <ol className="pathway-flow">
                  {pw.flow.map((step, i) => <li key={i}>{step}</li>)}
                </ol>
                <div className="pathway-refs">
                  <strong>Referências:</strong> {pw.refs.join(' · ')}
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Questionários */}
        <div className="av-section">
          <div className="av-section-eye">Instrumentos</div>
          <h2 className="av-section-title">Questionários <em>aplicados</em></h2>
          <div className="av-section-sub">Clique para ver itens, escalas, cutoffs e referência bibliográfica de cada instrumento.</div>
          <QuestionnairesSection />
        </div>

        {/* Notificações */}
        <div className="av-section">
          <div className="av-section-eye">Comunicação</div>
          <h2 className="av-section-title">Notificações <em>· quando, como, para qual tarefa</em></h2>
          <div className="av-section-sub">Cada notificação tem propósito · está vinculada a uma tarefa concreta · canal escolhido pela severidade.</div>
          <div style={{overflowX:'auto'}}>
            <table className="notif-table">
              <thead>
                <tr>
                  <th>Quando</th>
                  <th>Canal</th>
                  <th>Mensagem</th>
                  <th>Tarefa vinculada</th>
                  <th>Tipo</th>
                </tr>
              </thead>
              <tbody>
                {NOTIFICATIONS.map((n, i) => (
                  <tr key={i}>
                    <td>{n.when}</td>
                    <td>{n.channel}</td>
                    <td style={{fontStyle:'italic',color:'var(--ink-mid)'}}>"{n.msg}"</td>
                    <td>{n.task}</td>
                    <td><span className={`notif-kind ${n.kind}`}>{n.kind === 'info' ? 'rotina' : n.kind === 'attention' ? 'atenção' : 'crítico'}</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>

        {/* Referências */}
        <div className="av-section">
          <div className="av-section-eye">Evidência</div>
          <h2 className="av-section-title">Referências <em>bibliográficas</em></h2>
          <div className="av-section-sub">Base científica para limiares, algoritmos e instrumentos descritos neste documento.</div>
          <div className="ref-list">
            {REFERENCES.map((r, i) => (
              <div key={i} className="ref-item">
                <div className="ref-cat">{r.cat}</div>
                <div className="ref-text">{r.text}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Glossary */}
        <div className="glossary">
          <div className="glossary-eye">Glossário de severidade</div>
          <div className="glossary-grid">
            <div className="glossary-item"><strong>🟢</strong><span>Verde · ação proativa, sem urgência. Conteúdo educativo, validação afetiva, silêncio quando indicado.</span></div>
            <div className="glossary-item"><strong>🟡</strong><span>Amarelo · sinal de atenção. Mensagem da equipe, task no app, reavaliação em dias.</span></div>
            <div className="glossary-item"><strong>🔴</strong><span>Vermelho · alerta. Vídeo agendado, contato direto da Dra, reavaliação clínica.</span></div>
            <div className="glossary-item"><strong>🚨</strong><span>Crítico · urgência. Ligação imediata, médico de plantão, ponte clínica direta.</span></div>
          </div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
