<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visão do paciente · obesidade</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --parchment: #FAF7F2;
  --parchment-warm: #F1ECE2;
  --bone: #FDFCFA;
  --ink-deep: #1F1B16;
  --ink-mid: #4A4338;
  --ink-light: #8A8074;
  --moss: #5C7544;
  --moss-light: #95D085;
  --moss-bg: #E8EFDF;
  --moss-edge: #B8CFA8;
  --sienna: #B5663A;
  --amber: #C89C46;
  --amber-bg: #F5E9CC;
  --rust: #A04830;
  --rust-bg: #F3DCD2;
  --plum: #7D5A7C;
  --plum-bg: #EBE0EA;
  --teal: #4A8B82;
  --line-faint: #E8E0D2;
  --line-mid: #D5CCB8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Source Sans 3', sans-serif;
  background: var(--parchment-warm);
  color: var(--ink-deep);
  font-size: 14px;
  line-height: 1.5;
}
#root { min-height: 100vh; display: flex; flex-direction: column; }

.mode-bar {
  background: var(--ink-deep);
  color: var(--parchment);
  padding: 10px 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
  flex-wrap: wrap;
}
.mode-title {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 15px;
  flex: 1;
}
.mode-title strong { font-weight: 500; font-style: normal; margin-right: 6px; }
.mode-tab {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  color: var(--parchment);
  padding: 5px 11px;
  border-radius: 6px;
  font-size: 11px;
  font-family: inherit;
  cursor: pointer;
}
.mode-tab:hover { background: rgba(255,255,255,0.14); }
.mode-tab.active { background: var(--parchment); color: var(--ink-deep); border-color: var(--parchment); font-weight: 600; }
.patient-switcher { display: flex; gap: 4px; }
.patient-switcher .pt {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
  color: rgba(250,247,242,0.7); padding: 4px 9px;
  border-radius: 5px; font-size: 11px; cursor: pointer; font-family: inherit;
}
.patient-switcher .pt.active { background: rgba(255,255,255,0.18); color: var(--parchment); }

.device-scene {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  overflow: auto;
}
.device-frame {
  width: 390px;
  background: var(--ink-deep);
  border-radius: 38px;
  padding: 10px;
}
.device-screen {
  background: var(--parchment);
  border-radius: 30px;
  overflow: hidden;
  min-height: 800px;
  display: flex; flex-direction: column;
  position: relative;
}
.status-bar {
  height: 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 18px;
  font-size: 11px;
  font-weight: 600;
}

.onb-prog { padding: 6px 18px 12px; }
.onb-prog-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.onb-prog-step { font-size: 9px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-light); }
.onb-close { background: none; border: none; font-size: 18px; color: var(--ink-light); cursor: pointer; padding: 0 4px; }
.onb-prog-track { height: 3px; background: var(--parchment-warm); border-radius: 2px; overflow: hidden; }
.onb-prog-fill { height: 100%; background: var(--moss); transition: width 0.3s; border-radius: 2px; }

.onb-content { flex: 1; padding: 14px 22px 22px; overflow-y: auto; }
.onb-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 500; letter-spacing: -0.01em; line-height: 1.1; margin-bottom: 4px; }
.onb-title em { font-style: italic; color: var(--moss); }
.onb-sub { font-size: 12px; color: var(--ink-light); margin-bottom: 18px; }

.onb-ack {
  background: linear-gradient(135deg, var(--moss-bg), #DFE8D8);
  border-radius: 10px;
  padding: 10px 13px;
  margin-bottom: 16px;
  display: grid;
  grid-template-columns: 20px 1fr;
  gap: 10px;
  align-items: flex-start;
  animation: ackIn 0.4s ease-out;
}
@keyframes ackIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
.onb-ack-icon { font-size: 14px; padding-top: 2px; }
.onb-ack-msg { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 13.5px; line-height: 1.4; color: var(--ink-deep); }
.onb-ack-msg strong { font-style: normal; font-weight: 600; font-family: 'Source Sans 3', sans-serif; font-size: 12.5px; color: var(--moss); }

.form-blurb {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 15px;
  color: var(--ink-mid);
  line-height: 1.45;
  margin-bottom: 14px;
  padding-left: 10px;
  border-left: 2px solid var(--moss-edge);
}
.info-blurb { background: var(--moss-bg); border-radius: 8px; padding: 9px 12px; font-size: 12px; color: var(--moss); margin-top: 12px; }
.help-note { font-size: 11px; color: var(--ink-light); font-style: italic; margin-top: 10px; }
.form-group { margin-bottom: 12px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.form-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-light); display: block; margin-bottom: 5px; }
.form-input, .form-select, .form-textarea {
  width: 100%; background: var(--bone); border: 1px solid var(--line-mid);
  border-radius: 7px; padding: 8px 11px; font-size: 14px; font-family: inherit; color: var(--ink-deep);
}
.form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--moss); }
.form-textarea { resize: vertical; min-height: 60px; }
.form-hint { font-size: 11px; color: var(--ink-light); margin-top: 4px; }
.chip-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { background: var(--bone); border: 1px solid var(--line-mid); border-radius: 16px; padding: 6px 12px; font-size: 12px; font-family: inherit; color: var(--ink-mid); cursor: pointer; }
.chip:hover { border-color: var(--moss-edge); }
.chip.selected { background: var(--moss-bg); border-color: var(--moss); color: var(--moss); font-weight: 600; }
.check-row { display: flex; align-items: center; gap: 9px; padding: 8px 10px; background: var(--bone); border: 1px solid var(--line-mid); border-radius: 7px; cursor: pointer; font-size: 13px; }

.sm-row { background: var(--bone); border: 1px solid var(--line-faint); border-radius: 9px; padding: 11px 12px; margin-bottom: 8px; }
.sm-row-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.sm-row-icon { font-size: 18px; }
.sm-row-label { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 500; }
.sm-row-q { font-size: 11.5px; color: var(--ink-light); font-style: italic; }
.sm-lights { display: flex; gap: 8px; }
.sm-light {
  flex: 1; height: 32px; border-radius: 6px; border: 2px solid var(--line-mid);
  background: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-family: inherit; color: var(--ink-light);
}
.sm-light.green:hover, .sm-light.green.selected { background: var(--moss-bg); border-color: var(--moss); }
.sm-light.amber:hover, .sm-light.amber.selected { background: var(--amber-bg); border-color: var(--amber); }
.sm-light.red:hover, .sm-light.red.selected { background: var(--rust-bg); border-color: var(--rust); }

.fn-slider-wrap { background: linear-gradient(135deg, var(--plum-bg), #E5D5E3); border-radius: 11px; padding: 16px 14px; }
.fn-slider-val { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 40px; text-align: center; color: var(--ink-deep); line-height: 1; }
.fn-slider-val .u { font-size: 14px; font-style: normal; font-family: 'Source Sans 3', sans-serif; color: var(--plum); }
.fn-slider-label { text-align: center; font-size: 12.5px; color: var(--ink-mid); font-style: italic; margin-top: 4px; margin-bottom: 12px; }
.fn-slider {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 8px;
  background: linear-gradient(90deg, var(--moss) 0%, var(--amber) 50%, var(--rust) 100%);
  border-radius: 4px; outline: none;
}
.fn-slider::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 24px; height: 24px; border-radius: 50%;
  background: white; border: 3px solid var(--plum); cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}
.fn-slider::-moz-range-thumb { width: 24px; height: 24px; border-radius: 50%; background: white; border: 3px solid var(--plum); cursor: pointer; }
.fn-scale-labels { display: flex; justify-content: space-between; font-size: 9.5px; font-weight: 700; color: var(--plum); margin-top: 6px; letter-spacing: 0.08em; text-transform: uppercase; }

.dev-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.dev-card { background: var(--bone); border: 2px solid var(--line-mid); border-radius: 9px; padding: 11px 9px; text-align: center; cursor: pointer; }
.dev-card.selected { background: var(--moss-bg); border-color: var(--moss); }
.dev-card-icon { font-size: 22px; }
.dev-card-label { font-size: 11px; font-weight: 600; margin-top: 4px; }
.dev-card-brand { font-size: 10px; color: var(--ink-light); margin-top: 1px; }

.summary-card { background: var(--bone); border: 1px solid var(--line-faint); border-radius: 10px; padding: 12px 14px; }
.summary-line { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--line-faint); font-size: 12px; }
.summary-line:last-child { border-bottom: none; }
.summary-line span:first-child { color: var(--ink-light); }
.summary-line strong { color: var(--ink-deep); font-weight: 600; }

/* ═══════════ Dashboard final (read-only) ═══════════ */
.dash-review-badge {
  background: var(--ink-deep);
  color: var(--parchment);
  border-radius: 10px;
  padding: 11px 14px;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.dash-review-pulse {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--amber);
  animation: pulseBadge 1.6s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes pulseBadge {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(1.3); }
}
.dash-review-text { font-size: 12px; line-height: 1.4; }
.dash-review-text strong { display: block; font-size: 13px; margin-bottom: 1px; }
.dash-review-text span { color: rgba(250,247,242,0.7); font-size: 11px; font-style: italic; }

.dash-greet {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 18px;
  color: var(--ink-mid);
  line-height: 1.35;
  padding-left: 10px;
  border-left: 2px solid var(--moss-edge);
  margin-bottom: 14px;
}
.dash-greet strong { font-style: normal; color: var(--ink-deep); }

.dash-section { margin-bottom: 12px; }
.dash-section-eye {
  font-size: 9px; font-weight: 700; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--ink-light);
  margin-bottom: 4px; padding: 0 2px;
}

.dash-card {
  background: var(--bone);
  border: 1px solid var(--line-faint);
  border-radius: 10px;
  padding: 11px 13px;
}
.dash-card-row {
  display: flex; justify-content: space-between;
  align-items: baseline;
  gap: 10px;
}
.dash-card-label {
  font-size: 11px;
  color: var(--ink-light);
}
.dash-card-value {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 18px;
  color: var(--ink-deep);
}
.dash-card-value .u {
  font-size: 11px;
  font-family: 'Source Sans 3', sans-serif;
  font-style: normal;
  color: var(--ink-light);
  margin-left: 2px;
}
.dash-card-context {
  font-size: 11.5px;
  color: var(--ink-mid);
  font-style: italic;
  margin-top: 4px;
  line-height: 1.35;
}
.dash-card-context strong { font-style: normal; font-weight: 600; color: var(--ink-deep); }

/* IMC indicator */
.imc-indicator {
  display: flex; align-items: center; gap: 8px;
  margin-top: 8px;
}
.imc-bar {
  flex: 1; height: 6px;
  background: linear-gradient(90deg, var(--moss) 0%, var(--moss) 30%, var(--amber) 50%, var(--rust) 80%, var(--rust) 100%);
  border-radius: 3px;
  position: relative;
}
.imc-pointer {
  position: absolute;
  top: -3px;
  width: 12px; height: 12px;
  background: white;
  border: 2px solid var(--ink-deep);
  border-radius: 50%;
  transform: translateX(-50%);
}
.imc-class-tag {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 10px;
}
.imc-class-tag.eutrofia { background: var(--moss-bg); color: var(--moss); }
.imc-class-tag.sobrepeso { background: var(--amber-bg); color: #8B6817; }
.imc-class-tag.obesidade { background: var(--rust-bg); color: var(--rust); }

/* SM dot row */
.dash-sm-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
  margin-top: 6px;
}
.dash-sm-cell {
  text-align: center;
  padding: 6px 2px;
  border-radius: 6px;
  background: white;
}
.dash-sm-cell-icon { font-size: 14px; }
.dash-sm-cell-light {
  width: 12px; height: 12px;
  border-radius: 50%;
  margin: 4px auto 0;
  background: var(--line-mid);
}
.dash-sm-cell-light.green { background: var(--moss); }
.dash-sm-cell-light.amber { background: var(--amber); }
.dash-sm-cell-light.red { background: var(--rust); }
.dash-sm-cell-label {
  font-size: 8px; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--ink-light);
  margin-top: 3px;
}

/* Food noise mini */
.dash-fn-bar {
  margin-top: 6px;
  height: 6px;
  background: linear-gradient(90deg, var(--moss) 0%, var(--amber) 50%, var(--rust) 100%);
  border-radius: 3px;
  position: relative;
}
.dash-fn-pointer {
  position: absolute;
  top: -3px;
  width: 12px; height: 12px;
  background: white;
  border: 2px solid var(--plum);
  border-radius: 50%;
  transform: translateX(-50%);
}

/* Risk tag */
.risk-tag {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 10px;
}
.risk-tag.baixo { background: var(--moss-bg); color: var(--moss); }
.risk-tag.moderado { background: var(--amber-bg); color: #8B6817; }
.risk-tag.alto { background: var(--rust-bg); color: var(--rust); }

/* Chips read-only display */
.dash-chips-readonly {
  display: flex; flex-wrap: wrap; gap: 4px;
  margin-top: 6px;
}
.dash-chip-ro {
  background: var(--moss-bg);
  color: var(--moss);
  border-radius: 12px;
  padding: 3px 9px;
  font-size: 10.5px;
  font-weight: 600;
}
.dash-chip-ro.empty {
  background: var(--parchment-warm);
  color: var(--ink-light);
  font-style: italic;
  font-weight: 400;
}

/* Final insight - poetic closing */
.dash-closing {
  background: linear-gradient(135deg, var(--moss-bg), #DFE8D8);
  border-radius: 11px;
  padding: 13px 15px;
  margin-top: 14px;
}
.dash-closing-eye {
  font-size: 9px; font-weight: 700; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--moss);
  margin-bottom: 4px;
}
.dash-closing-text {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 15px;
  line-height: 1.4;
  color: var(--ink-deep);
}
.dash-closing-text strong { font-style: normal; font-weight: 600; }

.onb-actions { padding: 12px 22px 16px; display: flex; gap: 8px; border-top: 1px solid var(--line-faint); background: var(--parchment); }
.onb-btn { padding: 11px 16px; border-radius: 9px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
.onb-btn-back { background: var(--bone); color: var(--ink-mid); border: 1px solid var(--line-mid); }
.onb-btn-next { background: var(--ink-deep); color: var(--parchment); flex: 1; }
.onb-btn-next:hover { background: #2A2520; }

.home-wrap { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
.home-head { padding: 14px 22px 10px; display: flex; align-items: center; gap: 12px; }
.home-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: white; font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 18px;
}
.home-avatar.moss { background: var(--moss); }
.home-avatar.sienna { background: var(--sienna); }
.home-avatar.plum { background: var(--plum); }
.home-greet { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500; line-height: 1.1; }
.home-greet em { font-style: italic; color: var(--moss); }
.home-date { font-size: 10px; color: var(--ink-light); letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600; margin-top: 2px; }

.home-content { padding: 0 18px 18px; display: flex; flex-direction: column; gap: 12px; }

.insight-card { background: linear-gradient(135deg, var(--moss-bg), #DFE8D8); border-radius: 13px; padding: 14px 16px; }
.insight-eye { font-size: 9px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--moss); margin-bottom: 4px; }
.insight-title { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 500; line-height: 1.2; }
.insight-title em { font-style: italic; color: var(--moss); }
.insight-body { font-size: 13px; color: var(--ink-mid); margin-top: 6px; line-height: 1.4; }
.insight-body strong { color: var(--ink-deep); font-weight: 600; }

.section-eye { font-size: 9px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-light); padding: 4px 2px; }

.next-card { background: white; border: 1px solid var(--line-faint); border-left: 3px solid var(--sienna); border-radius: 0 10px 10px 0; padding: 11px 13px; display: flex; align-items: center; gap: 11px; }
.next-icon { font-size: 24px; }
.next-info { flex: 1; }
.next-when { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--sienna); }
.next-title { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 500; margin-top: 2px; }

.task-card { background: white; border: 1px solid var(--line-faint); border-radius: 10px; padding: 11px 13px; display: flex; align-items: center; gap: 11px; cursor: pointer; }
.task-card.urgent { border-left: 3px solid var(--rust); padding-left: 11px; }
.task-card.hot { border-left: 3px solid var(--plum); padding-left: 11px; }
.task-card:hover { background: var(--bone); }
.task-icon { width: 36px; height: 36px; border-radius: 8px; background: var(--moss-bg); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.task-icon.amber { background: var(--amber-bg); }
.task-icon.rust { background: var(--rust-bg); }
.task-icon.plum { background: var(--plum-bg); }
.task-info { flex: 1; }
.task-label { font-size: 13.5px; font-weight: 600; color: var(--ink-deep); }
.task-sub { font-size: 11px; color: var(--ink-light); font-style: italic; margin-top: 1px; }
.task-chev { color: var(--ink-light); font-size: 16px; }

.dr-card { background: var(--ink-deep); color: var(--parchment); border-radius: 12px; padding: 13px 15px; }
.dr-eye { font-size: 9px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(250,247,242,0.55); margin-bottom: 5px; }
.dr-msg { font-family: 'Cormorant Garamond', serif; font-size: 15px; line-height: 1.35; font-style: italic; }
.dr-actions { display: flex; gap: 6px; margin-top: 9px; }
.dr-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: var(--parchment); padding: 5px 10px; border-radius: 6px; font-size: 11px; font-family: inherit; cursor: pointer; }
.dr-btn.primary { background: var(--parchment); color: var(--ink-deep); }

.dev-status-card { background: white; border: 1px solid var(--line-faint); border-radius: 10px; padding: 10px 13px; }
.dev-status-row { display: flex; align-items: center; gap: 9px; padding: 5px 0; border-bottom: 1px solid var(--line-faint); font-size: 12px; }
.dev-status-row:last-child { border-bottom: none; }
.dev-status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--moss); }
.dev-status-name { flex: 1; font-weight: 500; }
.dev-status-val { color: var(--ink-light); font-size: 11px; }

.snip-list { background: white; border: 1px solid var(--line-faint); border-radius: 10px; padding: 4px 0; }
.snip-row { display: flex; gap: 11px; padding: 9px 13px; border-bottom: 1px solid var(--line-faint); }
.snip-row:last-child { border-bottom: none; }
.snip-icon { font-size: 16px; padding-top: 1px; flex-shrink: 0; }
.snip-text { flex: 1; font-size: 12.5px; line-height: 1.4; }
.snip-when { font-size: 9.5px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-light); margin-bottom: 2px; }
.snip-text strong { font-weight: 600; }

/* Trajectory chart */
.traj-wrap {
  background: var(--bone);
  border: 1px solid var(--line-faint);
  border-radius: 12px;
  padding: 12px 10px 10px;
  margin-bottom: 12px;
}
.traj-head {
  display: flex; align-items: baseline; justify-content: space-between;
  padding: 0 4px 6px;
}
.traj-eye { font-size: 9.5px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-mid); }
.traj-week { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 14px; color: var(--ink-deep); }
.traj-svg { width: 100%; height: auto; display: block; }
.traj-legend {
  display: flex; flex-wrap: wrap; gap: 14px; justify-content: center;
  font-size: 10px; color: var(--ink-mid);
  margin-top: 6px; padding: 6px 0 0;
  border-top: 1px solid var(--line-faint);
}
.traj-leg-item { display: flex; align-items: center; gap: 5px; }
.traj-dot { width: 8px; height: 8px; border-radius: 50%; }
.traj-dot.measured { background: var(--moss); border: 1.5px solid var(--ink-deep); }
.traj-dash {
  width: 18px; height: 2px;
  background-image: linear-gradient(90deg, currentColor 50%, transparent 50%);
  background-size: 4px 2px;
}
.traj-dash.forecast { color: var(--moss-edge); }
.traj-dash.target { color: var(--teal); }

/* Meta acordada card */
.meta-card {
  background: linear-gradient(135deg, var(--moss-bg) 0%, var(--bone) 100%);
  border: 1px solid var(--moss-edge);
  border-radius: 12px;
  padding: 13px 14px;
  margin-bottom: 12px;
}
.meta-card-eye {
  font-size: 9.5px; font-weight: 700; letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--moss);
  margin-bottom: 10px;
}
.meta-card-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
  margin-bottom: 10px;
}
.meta-card-cell { text-align: center; }
.meta-card-cell-val {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 22px;
  color: var(--moss);
  line-height: 1;
}
.meta-card-cell-val .u {
  font-family: 'Source Sans 3'; font-size: 10px;
  font-style: normal; color: var(--ink-light); margin-left: 1px;
}
.meta-card-cell-lbl {
  font-size: 8.5px; color: var(--ink-light);
  text-transform: uppercase; letter-spacing: 0.1em;
  margin-top: 3px;
}
.meta-card-progress { margin: 10px 0 9px; }
.meta-card-progress-bar {
  height: 5px; background: rgba(0,0,0,0.06); border-radius: 3px; overflow: hidden;
}
.meta-card-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--moss), var(--teal));
}
.meta-card-progress-text {
  font-size: 11px; color: var(--ink-mid);
  margin-top: 4px; text-align: center;
}
.meta-card-progress-text strong { color: var(--moss); font-weight: 700; }
.meta-card-func {
  display: flex; align-items: flex-start; gap: 7px;
  padding: 8px 10px;
  background: white;
  border-radius: 8px;
  border-left: 2px solid var(--moss);
}
.meta-card-func-icon { font-size: 13px; flex-shrink: 0; }
.meta-card-func-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 13.5px; line-height: 1.35;
  color: var(--ink-deep);
  font-style: italic;
}
.meta-card-meta {
  font-size: 9.5px; color: var(--ink-light);
  text-align: right;
  margin-top: 6px;
  font-style: italic;
}

/* Plano terapêutico card */
.plan-card {
  background: white;
  border: 1px solid var(--line-mid);
  border-radius: 11px;
  padding: 13px 14px;
  margin-bottom: 12px;
  cursor: pointer;
  transition: border-color 0.18s, transform 0.18s;
}
.plan-card:hover { border-color: var(--moss-edge); }
.plan-card:active { transform: scale(0.99); }
.plan-card-head {
  display: flex; justify-content: space-between; align-items: center;
}
.plan-card-eye {
  font-size: 9.5px; font-weight: 700; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--ink-mid);
}
.plan-card-chev { font-size: 16px; color: var(--ink-light); }
.plan-card-med {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 18px;
  color: var(--ink-deep);
  margin-top: 5px;
  line-height: 1.2;
}
.plan-card-med.suspended { color: var(--rust); }
.plan-card-phase {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  margin-top: 6px;
}
.plan-phase-tag {
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 99px;
}
.plan-phase-tag.titulacao { background: var(--sienna-bg); color: var(--sienna); }
.plan-phase-tag.resposta { background: var(--moss-bg); color: var(--moss); }
.plan-phase-tag.manutencao { background: var(--teal-bg); color: var(--teal); }
.plan-card-since {
  font-size: 10px; color: var(--ink-light);
  font-style: italic;
}
.plan-card-next {
  margin-top: 9px; padding-top: 8px;
  border-top: 1px dashed var(--line-mid);
}
.plan-card-next-eye {
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.18em;
  color: var(--ink-light);
  display: block;
  margin-bottom: 3px;
}
.plan-card-next-text {
  font-size: 12px; color: var(--ink-deep);
  line-height: 1.4;
}

/* Plan modal */
.plan-section {
  margin-top: 14px; padding-top: 12px;
  border-top: 1px solid var(--line-faint);
}
.plan-section-eye {
  font-size: 9.5px; font-weight: 700;
  letter-spacing: 0.18em;
  color: var(--ink-light);
  margin-bottom: 6px;
}
.plan-section-text {
  font-size: 13px; line-height: 1.45;
  color: var(--ink-deep);
}
.plan-history {
  display: flex; flex-direction: column; gap: 5px;
}
.plan-history-row {
  display: flex; gap: 10px;
  padding: 7px 9px;
  background: var(--bone);
  border-radius: 7px;
  border-left: 2px solid var(--line-mid);
}
.plan-history-row.warn { border-left-color: var(--rust); background: var(--rust-bg); }
.plan-history-row.current { border-left-color: var(--moss); background: var(--moss-bg); }
.plan-history-week {
  font-size: 9.5px; font-weight: 700;
  color: var(--ink-light);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  flex-shrink: 0;
  width: 42px;
  padding-top: 1px;
}
.plan-history-text {
  font-size: 12px; line-height: 1.35;
  color: var(--ink-deep);
  flex: 1;
}

/* === PRE-CONSULT SAFETY === */
.preconsult-wrap {
  flex: 1;
  display: flex; flex-direction: column;
  overflow-y: auto;
  padding: 0 22px 28px;
}
.preconsult-header { padding: 20px 0 14px; }
.preconsult-eye {
  font-size: 9.5px; font-weight: 700; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--moss);
  margin-bottom: 7px;
}
.preconsult-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px; font-weight: 500;
  margin: 0 0 9px;
  line-height: 1.1;
  color: var(--ink-deep);
}
.preconsult-title em { font-style: italic; color: var(--moss); font-weight: 500; }
.preconsult-intro {
  font-size: 13px; line-height: 1.5;
  color: var(--ink-mid);
  margin: 0;
}
.preconsult-intro strong { color: var(--ink-deep); font-weight: 600; }

.pc-profile-card {
  background: var(--bone);
  border: 1px solid var(--line-mid);
  border-radius: 10px;
  padding: 13px 15px;
  margin-bottom: 14px;
}
.pc-profile-eye {
  font-size: 9px; font-weight: 700; letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-light);
  margin-bottom: 8px;
}
.pc-profile-row {
  display: flex; justify-content: space-between;
  font-size: 11.5px; padding: 3px 0;
  gap: 12px;
}
.pc-profile-row span { color: var(--ink-light); flex-shrink: 0; }
.pc-profile-row strong { color: var(--ink-deep); font-weight: 600; text-align: right; }

.pc-section {
  background: white;
  border: 1px solid var(--line-faint);
  border-radius: 11px;
  padding: 14px 15px;
  margin-bottom: 11px;
}
.pc-section-eye {
  font-size: 10px; font-weight: 700; letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-deep);
  margin-bottom: 8px;
}
.pc-section-intro {
  font-size: 12px; line-height: 1.45;
  color: var(--ink-mid);
  margin: 0 0 11px;
}

.pc-warning {
  background: var(--parchment-warm);
  border-left: 2px solid var(--ink-mid);
  padding: 9px 12px;
  font-size: 11.5px;
  line-height: 1.45;
  color: var(--ink-mid);
  border-radius: 4px;
  margin-bottom: 11px;
}
.pc-warning.amber {
  background: var(--amber-bg);
  border-left-color: var(--amber);
  color: #6B4E0F;
}
.pc-warning strong { color: var(--ink-deep); font-weight: 600; }

.pc-med-list { display: flex; flex-direction: column; gap: 6px; }
.pc-med-chip {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
  width: 100%;
  text-align: left;
  background: var(--bone);
  border: 1.5px solid var(--line-mid);
  border-radius: 8px;
  padding: 10px 12px;
  font-family: inherit;
  font-size: 12.5px;
  color: var(--ink-deep);
  cursor: pointer;
  line-height: 1.3;
  transition: border-color 0.15s, background 0.15s;
}
.pc-med-chip:hover { border-color: var(--moss-edge); }
.pc-med-chip.selected {
  background: var(--moss-bg);
  border-color: var(--moss);
}
.pc-med-chip.flagged.selected {
  background: var(--amber-bg);
  border-color: var(--amber);
}
.pc-med-chip.narrow.selected {
  background: var(--rust-bg);
  border-color: var(--rust);
}
.pc-med-warn-icon { font-size: 13px; flex-shrink: 0; }
.pc-med-flag-text {
  font-size: 10.5px;
  color: #8B6817;
  background: var(--amber-bg);
  border-left: 2px solid var(--amber);
  padding: 5px 10px;
  margin: 4px 0 2px;
  border-radius: 4px;
  font-style: italic;
  line-height: 1.35;
}
.pc-med-flag-text.narrow {
  color: var(--rust);
  background: var(--rust-bg);
  border-left-color: var(--rust);
}
.pc-med-dose { margin: 5px 0 2px; padding-left: 14px; }
.pc-med-dose .form-input {
  font-size: 12px;
  padding: 7px 10px;
  background: white;
}

.pc-input-row { display: flex; gap: 8px; }
.pc-input-row .form-input { flex: 1; }

.pc-redflag {
  background: linear-gradient(135deg, var(--rust-bg), #EBC7BB);
  border: 1.5px solid var(--rust);
  border-radius: 10px;
  padding: 12px 14px;
  margin: 12px 0;
}
.pc-redflag-eye {
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.14em;
  color: var(--rust);
  margin-bottom: 5px;
  text-transform: uppercase;
}
.pc-redflag p {
  font-size: 12.5px; line-height: 1.5;
  color: var(--ink-deep);
  margin: 0;
}
.pc-redflag p strong { color: var(--rust); font-weight: 700; }

.pc-submit-block {
  background: var(--moss-bg);
  border: 1px solid var(--moss-edge);
  border-radius: 11px;
  padding: 14px 15px;
  margin-top: 14px;
}
.pc-submit-eye {
  font-size: 10px; font-weight: 700; letter-spacing: 0.18em;
  color: var(--moss);
  margin-bottom: 5px;
}
.pc-submit-summary { margin-bottom: 11px; }
.pc-submit-summary p {
  font-size: 12.5px; line-height: 1.45;
  color: var(--ink-mid);
  margin: 0;
}
.pc-submit-summary p strong { color: var(--rust); font-weight: 700; }
.pc-submit-btn {
  width: 100%;
  background: var(--moss);
  color: white;
  border: none;
  padding: 12px 16px;
  border-radius: 8px;
  font-family: inherit;
  font-size: 13.5px;
  font-weight: 600;
  cursor: pointer;
}
.pc-submit-btn:hover { background: #4F6240; }

/* Mental health screening blocks */
.mh-block {
  border-top: 1px dashed var(--line-mid);
  padding-top: 12px;
  margin-top: 12px;
}
.mh-block:first-of-type { border-top: none; padding-top: 0; margin-top: 0; }
.mh-block-title {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 16px;
  color: var(--ink-deep);
  margin-bottom: 10px;
}
.mh-frame {
  font-size: 11.5px;
  color: var(--ink-mid);
  background: var(--parchment-warm);
  padding: 7px 11px;
  border-radius: 6px;
  margin-bottom: 9px;
  line-height: 1.4;
}
.mh-frame strong { color: var(--ink-deep); font-weight: 600; }

/* Scheduled task styling */
.task-card.scheduled {
  border: 1px solid var(--plum);
  background: linear-gradient(135deg, var(--plum-bg), white 70%);
}
.task-card.scheduled.teal { border-color: var(--teal); background: linear-gradient(135deg, var(--teal-bg), white 70%); }
.task-card.scheduled .task-icon {
  position: relative;
}
.task-card.scheduled .task-icon::before {
  content: '📅';
  position: absolute;
  top: -6px; right: -8px;
  font-size: 12px;
  background: white;
  border-radius: 50%;
  padding: 1px;
}
.task-card.scheduled .task-why {
  margin-top: 9px;
  padding: 9px 11px;
  background: rgba(255,255,255,0.7);
  border-radius: 7px;
  border-left: 2px solid var(--plum);
  font-size: 11.5px;
  line-height: 1.45;
  color: var(--ink-deep);
}
.task-card.scheduled.teal .task-why { border-left-color: var(--teal); }
.task-why-eye {
  font-size: 9px; font-weight: 700; letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--plum);
  margin-bottom: 3px;
}
.task-card.scheduled.teal .task-why-eye { color: var(--teal); }
.task-deadline.scheduled { background: var(--plum-bg); color: var(--plum); }
.task-deadline.scheduled-teal { background: var(--teal-bg); color: var(--teal); }

/* Mental health modal context */
.mh-modal-context {
  background: linear-gradient(135deg, var(--plum-bg), var(--bone));
  border-radius: 11px;
  padding: 13px 15px;
  margin: 12px 0;
}
.mh-modal-context-eye {
  font-size: 9.5px; font-weight: 700; letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--plum);
  margin-bottom: 6px;
}
.mh-modal-context p {
  font-size: 12.5px;
  line-height: 1.5;
  color: var(--ink-deep);
  margin: 0;
}
.mh-modal-context p strong { color: var(--plum); font-weight: 700; }

.mh-question-frame {
  background: var(--parchment-warm);
  border-left: 2px solid var(--moss);
  padding: 9px 12px;
  border-radius: 6px;
  margin: 11px 0;
  font-size: 12.5px;
  line-height: 1.5;
  color: var(--ink-deep);
}
.mh-question-frame strong { color: var(--moss); font-weight: 700; }

.likert-row.critical-item {
  border-color: var(--rust);
  background: var(--rust-bg);
}

/* Suicidality alert · special urgent care */
.suicidality-alert {
  background: linear-gradient(135deg, #FFF8F4, var(--rust-bg));
  border: 2px solid var(--rust);
  border-radius: 12px;
  padding: 16px 18px;
  margin: 14px 0;
  box-shadow: 0 4px 14px rgba(135, 67, 50, 0.15);
}
.suicidality-eye {
  font-size: 11px; font-weight: 700; letter-spacing: 0.14em;
  color: var(--rust);
  margin-bottom: 10px;
}
.suicidality-alert p {
  font-size: 13px;
  line-height: 1.55;
  color: var(--ink-deep);
  margin: 0 0 6px;
}
.suicidality-alert p strong { color: var(--rust); font-weight: 700; }
.suicidality-actions {
  display: flex; gap: 8px;
  margin-top: 12px;
}
.suicidality-btn {
  background: var(--rust);
  color: white;
  border: none;
  padding: 11px 16px;
  border-radius: 8px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  flex: 1;
}
.suicidality-btn:hover { background: #6D3729; }
.suicidality-btn.secondary {
  background: white;
  color: var(--rust);
  border: 1.5px solid var(--rust);
}
.suicidality-resources {
  background: white;
  border-radius: 8px;
  padding: 11px 13px;
  margin-top: 10px;
  font-size: 12px;
  line-height: 1.6;
}
.suicidality-resources strong { color: var(--rust); }

/* Sleep risk badges + follow-up section */
.sleep-badge {
  display: inline-flex;
  align-items: center;
  font-size: 11px;
  font-weight: 600;
  padding: 5px 11px;
  border-radius: 99px;
  line-height: 1.3;
  letter-spacing: 0.01em;
}
.sleep-badge.sleep-ok { background: var(--moss-bg); color: var(--moss); }
.sleep-badge.sleep-long { background: var(--parchment-warm); color: var(--ink-mid); }
.sleep-badge.sleep-warn { background: var(--amber-bg); color: #8B6817; }
.sleep-badge.sleep-high { background: linear-gradient(135deg, var(--amber-bg), var(--rust-bg)); color: #8B4A1F; border: 1px solid var(--amber); }
.sleep-badge.sleep-critical { background: var(--rust-bg); color: var(--rust); border: 1.5px solid var(--rust); }

.sleep-hint {
  font-size: 11.5px;
  line-height: 1.45;
  padding: 8px 12px;
  border-radius: 7px;
  margin-top: 8px;
}
.sleep-hint.warn { background: var(--amber-bg); color: #6B4E0F; border-left: 2px solid var(--amber); }
.sleep-hint.high { background: linear-gradient(90deg, var(--amber-bg), var(--rust-bg)); color: #6B3818; border-left: 2px solid var(--rust); }
.sleep-hint.critical { background: var(--rust-bg); color: var(--rust); border-left: 2px solid var(--rust); }
.sleep-hint strong { font-weight: 700; }

.sleep-follow {
  background: linear-gradient(135deg, var(--parchment-warm), white);
  border: 1px solid var(--amber);
  border-radius: 11px;
  padding: 14px 16px;
  margin: 10px 0 14px;
}
.sleep-follow-eye {
  font-size: 9.5px; font-weight: 700;
  letter-spacing: 0.2em;
  color: #8B4A1F;
  margin-bottom: 5px;
}
.sleep-follow-intro {
  font-size: 12px;
  color: var(--ink-mid);
  margin-bottom: 12px;
  font-style: italic;
}

/* STOP-BANG modal elements */
.stopbang-letter {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px; height: 22px;
  background: var(--teal);
  color: white;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.02em;
  margin-right: 4px;
  flex-shrink: 0;
}
.stopbang-auto {
  background: var(--bone);
  border: 1px solid var(--line-mid);
  border-radius: 9px;
  padding: 11px 13px;
  margin: 10px 0;
}
.stopbang-auto-eye {
  font-size: 9.5px; font-weight: 700; letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-light);
  margin-bottom: 8px;
}
.stopbang-auto-row {
  display: flex; align-items: center; gap: 10px;
  padding: 5px 0;
  font-size: 12px;
  color: var(--ink-deep);
}
.stopbang-auto-row > span:nth-child(2) { flex: 1; }
.stopbang-auto-val {
  font-size: 10.5px; font-weight: 600;
  padding: 3px 8px;
  border-radius: 99px;
  white-space: nowrap;
}
.stopbang-auto-val.yes { background: var(--amber-bg); color: #8B6817; }
.stopbang-auto-val.no { background: var(--moss-bg); color: var(--moss); }

/* Apnea warning card · respectful and informative */
.apnea-warning {
  background: linear-gradient(135deg, #F5EBE6, var(--rust-bg));
  border: 1.5px solid var(--rust);
  border-radius: 12px;
  padding: 14px 16px;
  margin-top: 12px;
  box-shadow: 0 3px 12px rgba(135, 67, 50, 0.1);
}
.apnea-warning-eye {
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.14em;
  color: var(--rust);
  margin-bottom: 9px;
}
.apnea-warning > p {
  font-size: 12.5px;
  line-height: 1.55;
  color: var(--ink-deep);
  margin: 0 0 11px;
}
.apnea-warning > p strong { color: var(--rust); font-weight: 700; }
.apnea-warning-why {
  background: white;
  border-left: 2px solid var(--rust);
  border-radius: 6px;
  padding: 9px 12px;
  margin-bottom: 10px;
}
.apnea-warning-next {
  background: var(--moss-bg);
  border-left: 2px solid var(--moss);
  border-radius: 6px;
  padding: 9px 12px;
  margin-bottom: 8px;
}
.apnea-warning-eye-small {
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.18em;
  color: var(--rust);
  margin-bottom: 5px;
}
.apnea-warning-next .apnea-warning-eye-small { color: var(--moss); }
.apnea-warning-why ul {
  margin: 0; padding: 0 0 0 16px;
  font-size: 11.5px;
  line-height: 1.5;
  color: var(--ink-deep);
}
.apnea-warning-why ul li { margin-bottom: 3px; }
.apnea-warning-why ul li strong { color: var(--rust); }
.apnea-warning-next p {
  font-size: 12px;
  line-height: 1.5;
  color: var(--ink-deep);
  margin: 0;
}
.apnea-warning-next p strong { color: var(--moss); font-weight: 700; }
.apnea-warning-foot {
  font-size: 11px;
  color: var(--ink-mid);
  font-style: italic;
  text-align: center;
  padding-top: 4px;
}

/* Reproductive history conditional section · women only */
.repro-section {
  background: linear-gradient(135deg, #F0E8F5, var(--bone));
  border: 1px solid var(--plum);
  border-radius: 11px;
  padding: 14px 16px;
  margin: 14px 0;
}
.repro-eye {
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 0.18em;
  color: var(--plum);
  margin-bottom: 5px;
  text-transform: uppercase;
}
.repro-intro {
  font-size: 12px;
  color: var(--ink-mid);
  font-style: italic;
  margin-bottom: 12px;
}
.repro-hint {
  font-size: 11.5px;
  line-height: 1.45;
  color: var(--ink-deep);
  background: white;
  border-left: 2px solid var(--plum);
  border-radius: 5px;
  padding: 8px 11px;
  margin-top: 8px;
}
.repro-hint strong { color: var(--plum); font-weight: 700; }
.repro-hint.critical {
  background: var(--rust-bg);
  border-left-color: var(--rust);
}
.repro-hint.critical strong { color: var(--rust); }

/* Reproductive gate when no sex selected */
.repro-gate {
  background: linear-gradient(135deg, var(--parchment-warm), var(--bone));
  border: 1px dashed var(--ink-light);
  border-radius: 11px;
  padding: 14px 17px;
  margin: 14px 0;
  display: flex;
  align-items: flex-start;
  gap: 13px;
}
.repro-gate-icon {
  font-size: 19px;
  color: var(--ink-light);
  flex-shrink: 0;
  margin-top: 1px;
}
.repro-gate-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-mid);
  margin-bottom: 4px;
}
.repro-gate-text {
  font-size: 12px;
  line-height: 1.5;
  color: var(--ink-mid);
}
.repro-gate-text strong { color: var(--ink-deep); font-weight: 700; }

/* Male reproductive section · different tonal accent */
.repro-section.male {
  background: linear-gradient(135deg, var(--teal-bg, #DCEBE8), var(--bone));
  border-color: var(--teal);
}
.repro-eye.male {
  color: var(--teal);
}
.repro-section.male .repro-hint {
  border-left-color: var(--teal);
}
.repro-section.male .repro-hint strong {
  color: var(--teal);
}

/* Bariatric conditional section */
.bariatric-section {
  background: linear-gradient(135deg, var(--bone), white);
  border: 1px solid var(--ink-light);
  border-radius: 12px;
  padding: 15px 17px;
  margin: 14px 0;
}
.bariatric-eye {
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 0.18em;
  color: var(--ink-mid);
  margin-bottom: 5px;
  text-transform: uppercase;
}
.bariatric-intro {
  font-size: 12px;
  color: var(--ink-mid);
  margin-bottom: 14px;
  line-height: 1.5;
}
.bariatric-intro strong { color: var(--ink-deep); font-weight: 700; }

/* Weight Journey Chart */
.weight-journey {
  background: white;
  border: 1px solid var(--line-faint);
  border-radius: 11px;
  padding: 13px 14px 11px;
  margin-top: 14px;
  overflow: hidden;
}
.wj-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 8px;
}
.wj-title {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: 16px;
  color: var(--ink-deep);
  font-weight: 400;
}
.wj-subtitle {
  font-size: 11px;
  color: var(--ink-mid);
  margin-top: 1px;
}
.wj-replay {
  background: var(--plum);
  color: white;
  border: none;
  border-radius: 99px;
  padding: 5px 12px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.02em;
  cursor: pointer;
  white-space: nowrap;
  font-family: inherit;
}
.wj-replay:hover { background: #6B4480; }
.wj-replay:disabled { opacity: 0.6; }
.wj-svg {
  cursor: pointer;
  width: 100%;
  height: auto;
  display: block;
  margin: 4px 0 8px;
}
.wj-summary {
  display: flex;
  gap: 16px;
  padding-top: 9px;
  border-top: 1px dashed var(--line-faint);
}
.wj-stat { flex: 1; }
.wj-stat-eye {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.14em;
  color: var(--ink-light);
  margin-bottom: 3px;
  text-transform: uppercase;
}
.wj-stat-val {
  font-family: var(--font-serif);
  font-size: 19px;
  font-weight: 400;
  font-style: italic;
}
.wj-stat-val.moss { color: var(--moss); }
.wj-stat-val.rust { color: var(--rust); }
.wj-stat-val span {
  font-family: var(--font-sans);
  font-style: normal;
  font-size: 11px;
  color: var(--ink-mid);
  font-weight: 400;
}
.wj-foot {
  font-size: 10px;
  color: var(--ink-light);
  font-style: italic;
  text-align: center;
  margin-top: 7px;
}

/* Learn patient card · in patient home */
.learn-patient-card {
  background: linear-gradient(135deg, #F0E8F5, white 70%);
  border: 1px solid var(--plum);
  border-radius: 14px;
  padding: 13px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  margin-bottom: 8px;
  transition: all 0.2s ease;
}
.learn-patient-card:hover {
  box-shadow: 0 4px 14px rgba(125, 90, 124, 0.15);
}
.learn-patient-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--plum), #6B4480);
  color: white;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.learn-patient-content { flex: 1; min-width: 0; }
.learn-patient-eyebrow {
  font-size: 8.5px;
  font-weight: 700;
  letter-spacing: 0.16em;
  color: var(--plum);
  margin-bottom: 3px;
}
.learn-patient-title {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: 15px;
  font-weight: 400;
  color: var(--ink-deep);
  margin-bottom: 1px;
  line-height: 1.25;
}
.learn-patient-sub {
  font-size: 10.5px;
  color: var(--ink-mid);
  font-style: italic;
}
.learn-patient-chev {
  color: var(--plum);
  font-size: 22px;
  font-weight: 300;
}

/* Learn Modal (patient-facing inside device) */
.learn-modal-eye {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.2em;
  color: var(--plum);
  margin-bottom: 6px;
}
.learn-modal-title {
  font-family: var(--font-serif);
  font-weight: 400;
  font-size: 21px;
  color: var(--ink-deep);
  margin: 0 0 12px;
  line-height: 1.2;
}
.learn-modal-title em {
  font-style: italic;
  color: var(--plum);
  font-size: 14px;
  font-weight: 300;
}
.learn-modal-format {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  background: #ECE4F2;
  color: var(--plum);
  border-radius: 99px;
  font-size: 10.5px;
  font-weight: 600;
  margin-bottom: 16px;
}
.learn-modal-question {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: 16px;
  line-height: 1.5;
  color: var(--ink-deep);
  padding: 13px 14px;
  background: var(--parchment-warm);
  border-left: 3px solid var(--plum);
  border-radius: 5px;
  margin-bottom: 14px;
}
.learn-modal-options {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 18px;
}
.learn-modal-option {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 11px 13px;
  background: white;
  border: 1px solid var(--line-mid);
  border-radius: 9px;
  text-align: left;
  cursor: pointer;
  transition: all 0.15s ease;
  font-family: inherit;
}
.learn-modal-option:hover { border-color: var(--plum); background: var(--bone); }
.learn-modal-option.selected {
  border-color: var(--plum);
  background: #F5EEF7;
  box-shadow: 0 0 0 2px rgba(125, 90, 124, 0.15);
}
.learn-modal-option-letter {
  width: 22px; height: 22px;
  background: var(--plum);
  color: white;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
}
.learn-modal-option-text {
  font-size: 13px;
  color: var(--ink-deep);
  line-height: 1.4;
  flex: 1;
}
.learn-modal-selected {
  background: var(--parchment-warm);
  border: 1px solid var(--plum);
  border-radius: 9px;
  padding: 11px 13px;
  margin-bottom: 14px;
}
.learn-modal-selected-eye {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.18em;
  color: var(--plum);
  margin-bottom: 6px;
}
.learn-modal-selected-text {
  display: flex;
  align-items: center;
  gap: 9px;
  font-size: 13px;
  color: var(--ink-deep);
  line-height: 1.4;
}
.learn-modal-reveal {
  background: linear-gradient(135deg, #F0E8F5, white);
  border: 1.5px solid var(--plum);
  border-radius: 11px;
  padding: 13px 15px;
  margin-bottom: 14px;
  box-shadow: 0 3px 10px rgba(125, 90, 124, 0.1);
}
.learn-modal-reveal-eye {
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 0.18em;
  color: var(--plum);
  margin-bottom: 7px;
}
.learn-modal-reveal p {
  margin: 0;
  font-size: 13.5px;
  line-height: 1.6;
  color: var(--ink-deep);
  font-style: italic;
}
.learn-modal-section {
  margin-bottom: 12px;
  padding: 11px 13px;
  background: var(--bone);
  border-radius: 8px;
  border-left: 2px solid var(--ink-light);
}
.learn-modal-section.moss {
  background: var(--moss-bg);
  border-left-color: var(--moss);
}
.learn-modal-section.amber {
  background: var(--amber-bg);
  border-left-color: var(--amber);
}
.learn-modal-section-eye {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.18em;
  color: var(--ink-light);
  margin-bottom: 5px;
}
.learn-modal-section-eye.moss { color: var(--moss); }
.learn-modal-section-eye.amber { color: #8B6817; }
.learn-modal-section p {
  margin: 0;
  font-size: 12px;
  line-height: 1.55;
  color: var(--ink-deep);
}
.learn-modal-ref {
  font-size: 10px;
  color: var(--ink-light);
  font-style: italic;
  padding: 8px 10px;
  background: var(--bone);
  border-radius: 5px;
  line-height: 1.5;
  margin-bottom: 16px;
}

.modal-overlay { position: absolute; inset: 0; background: rgba(31, 27, 22, 0.5); display: flex; align-items: flex-end; border-radius: 30px; z-index: 100; }

/* Stress slider */
.stress-slider-wrap {
  background: var(--bone);
  border: 1px solid var(--line-faint);
  border-radius: 9px;
  padding: 11px 14px;
}
.stress-slider-head {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 8px;
}
.stress-slider-label {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 15px;
  color: var(--ink-deep);
}
.stress-slider-val {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 18px;
  color: var(--moss);
}
.stress-slider-val .u {
  font-family: 'Source Sans 3'; font-style: normal; font-size: 11px;
  color: var(--ink-light); margin-left: 2px;
}
.stress-slider-scale {
  display: flex; justify-content: space-between;
  font-size: 9.5px; color: var(--ink-light);
  margin-top: 4px;
  text-transform: uppercase; letter-spacing: 0.08em;
}

/* Task completion · gamification */
.task-streak {
  display: flex; align-items: center; gap: 10px;
  background: linear-gradient(135deg, var(--moss-bg), var(--bone));
  border: 1px solid var(--moss-edge);
  border-radius: 10px;
  padding: 10px 13px;
  margin-bottom: 11px;
}
.task-streak-icon {
  font-size: 18px; flex-shrink: 0;
}
.task-streak-text {
  flex: 1;
  font-size: 12.5px;
  color: var(--ink-deep);
  line-height: 1.4;
}
.task-streak-text strong {
  color: var(--moss); font-weight: 700;
}
.task-streak-count {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 22px;
  color: var(--moss);
}
.task-card.done {
  background: var(--moss-bg);
  border-color: var(--moss-edge);
  opacity: 0.85;
}
.task-card.done .task-label {
  text-decoration: line-through;
  color: var(--ink-light);
}
.task-card.done .task-icon {
  background: var(--moss) !important;
  color: white !important;
}
.task-card.done .task-icon::after {
  content: '✓';
  position: absolute;
  font-size: 16px;
  font-weight: 700;
}
.task-card.done .task-icon > * {
  display: none;
}
.task-deadline {
  display: inline-block;
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 99px;
  margin-left: 7px;
  vertical-align: 1px;
}
.task-deadline.urgent { background: var(--rust-bg); color: var(--rust); }
.task-deadline.today { background: var(--amber-bg); color: #8B6817; }
.task-deadline.week { background: var(--moss-bg); color: var(--moss); }
.task-deadline.month { background: var(--bone); color: var(--ink-mid); border: 1px solid var(--line-mid); }
.task-deadline.opt { background: transparent; color: var(--ink-light); font-style: italic; font-weight: 400; }
.task-undo {
  font-size: 10px; color: var(--ink-light);
  font-style: italic;
  margin-left: 8px;
  cursor: pointer;
}
.task-undo:hover { color: var(--moss); }
.modal-sheet { background: var(--parchment); width: 100%; border-radius: 22px 22px 0 0; padding: 18px 22px 22px; max-height: 85%; overflow-y: auto; animation: sheetUp 0.25s ease-out; }
@keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle { width: 36px; height: 4px; background: var(--line-mid); border-radius: 2px; margin: -4px auto 12px; }
.modal-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500; line-height: 1.1; margin-bottom: 4px; }
.modal-title em { font-style: italic; color: var(--moss); }
.modal-sub { font-size: 12px; color: var(--ink-light); margin-bottom: 14px; }
.modal-actions { display: flex; gap: 8px; margin-top: 14px; }
.modal-actions .onb-btn-back { flex: 1; }
.modal-actions .onb-btn-next { flex: 2; }

.toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: var(--ink-deep); color: var(--parchment); padding: 10px 16px; border-radius: 10px; font-size: 13px; box-shadow: 0 6px 20px rgba(0,0,0,0.2); z-index: 200; animation: toastIn 0.25s ease-out; }
@keyframes toastIn { from { opacity: 0; transform: translate(-50%, -10px); } to { opacity: 1; transform: translate(-50%, 0); } }
.toast.success { border-left: 3px solid var(--moss); }
.toast.warning { border-left: 3px solid var(--amber); }

/* Satisfaction sliders (past attempts) */
.sat-row {
  background: var(--bone);
  border: 1px solid var(--line-faint);
  border-radius: 9px;
  padding: 10px 12px;
  margin-bottom: 6px;
}
.sat-row-head {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 7px; gap: 8px;
}
.sat-row-name {
  font-size: 12.5px; font-weight: 600;
  color: var(--ink-deep);
  flex: 1; min-width: 0;
  line-height: 1.25;
}
.sat-row-val {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 17px;
  color: var(--moss);
  white-space: nowrap;
}
.sat-row-val .u {
  font-size: 10px; font-family: 'Source Sans 3', sans-serif;
  font-style: normal; color: var(--ink-light);
  margin-left: 1px;
}
.sat-slider {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 5px;
  background: linear-gradient(90deg, var(--rust) 0%, var(--amber) 50%, var(--moss) 100%);
  border-radius: 3px; outline: none;
}
.sat-slider::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 18px; height: 18px; border-radius: 50%;
  background: white; border: 2px solid var(--moss);
  cursor: pointer;
  box-shadow: 0 1px 4px rgba(0,0,0,0.15);
}
.sat-slider::-moz-range-thumb {
  width: 18px; height: 18px; border-radius: 50%;
  background: white; border: 2px solid var(--moss);
  cursor: pointer;
}
.sat-row-label {
  font-size: 10.5px; color: var(--ink-light);
  font-style: italic;
  margin-top: 5px; text-align: right;
}

/* Night-eating frequency conditional slider */
.night-freq-wrap {
  background: var(--parchment-warm);
  border-radius: 8px;
  padding: 10px 12px;
  margin-top: 8px;
}
.night-freq-head {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 6px;
}
.night-freq-label { font-size: 11.5px; color: var(--ink-mid); font-style: italic; }
.night-freq-val { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 17px; color: var(--moss); }
.night-freq-val .u { font-size: 10px; font-family: 'Source Sans 3', sans-serif; font-style: normal; color: var(--ink-light); margin-left: 2px; }
.night-freq-scale { display: flex; justify-content: space-between; font-size: 9px; color: var(--ink-light); margin-top: 4px; }

/* Likert grid (FNQ, ECAP) */
.likert-row {
  background: var(--bone);
  border: 1px solid var(--line-faint);
  border-radius: 9px;
  padding: 11px 13px;
  margin-bottom: 8px;
}
.likert-q {
  font-size: 13px; line-height: 1.4;
  color: var(--ink-deep);
  margin-bottom: 8px;
}
.likert-num {
  font-size: 10px; font-weight: 700;
  color: var(--ink-light);
  letter-spacing: 0.08em;
  margin-right: 6px;
}
.likert-opts {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 4px;
}
.likert-opts.four { grid-template-columns: repeat(4, 1fr); }
.likert-opt {
  background: white;
  border: 1px solid var(--line-mid);
  border-radius: 6px;
  padding: 6px 2px;
  font-size: 9.5px;
  font-family: inherit;
  color: var(--ink-mid);
  cursor: pointer;
  line-height: 1.15;
  text-align: center;
  min-height: 36px;
  display: flex; align-items: center; justify-content: center;
}
.likert-opt:hover { border-color: var(--moss-edge); }
.likert-opt.selected { background: var(--moss-bg); border-color: var(--moss); color: var(--moss); font-weight: 600; }

/* Score reveal card */
.score-reveal {
  background: linear-gradient(135deg, var(--moss-bg), #DFE8D8);
  border-radius: 11px;
  padding: 14px 16px;
  margin-top: 14px;
}

/* Timeline */

}

}

}
.timeline-tick {

}
.milestones {

}
.milestone { position: absolute; transform: translateX(-50%); text-align: center; width: 130px; }
.milestone-dot {

/* Trigger cards */

}

}
.trigger-icon { font-size: 20px; }
.trigger-titles { min-width: 0; }
.trigger-title {

}
.trigger-voice {

.trigger-body {

.trigger-example {

}
.pathway-card {

function Onboarding() {
  const [step, setStep] = useState(0);
  const [data, setData] = useState({
    name: 'Júlia', age: '38', sex: 'feminino', city: 'São Paulo',
    email: 'julia@example.com', whatsapp: '+55 11 9...', channel: 'App + WhatsApp',
    height: '162', weightCurrent: '85', weightMax: '92', ageStart: '22',
    comorbidities: [], medClasses: [], allergyList: [], bariatric: false,
    family: [], activityFreq: '', sleepHours: '',
    sleepLatency: '', nightWaking: '', earlyWaking: '', snoring: '',
    hasChildren: '', childrenCount: '', cycles: '', menopauseYears: '',
    pregnancies: '', fertilityHistory: '',
    triedToHaveChildren: '', trtUse: '',
    bariatricYears: '', bariatricTechnique: '', bariatricPreWeight: '', 
    bariatricMinWeight: '', bariatricMinMonths: '',
    stress: 5, smoking: '', alcohol: '',
    pastAttempts: [], pastSatisfaction: {}, goals: [],
    sm: {}, pheno: {}, nightFreq: 0,
    binge: {}, ecap: {}, fnq: {},
    devices: [], anythingElse: ''
  });
  const [toast, setToast] = useState(null);
  const showToast = (msg, kind = 'success') => { setToast({ msg, kind }); setTimeout(() => setToast(null), 3000); };

  const STEPS = [
    { title: 'Bem-vinda', sub: 'para começar' },
    { title: <>Quem <em>você é</em></>, sub: 'só o básico' },
    { title: <>Seu <em>corpo</em></>, sub: 'para calibrar' },
    { title: <>Sua <em>saúde</em></>, sub: 'histórico que importa' },
    { title: <>Sua <em>família</em></>, sub: 'genética conta' },
    { title: <>Seus <em>hábitos</em></>, sub: 'rotina importa' },
    { title: <>Tentativas <em>anteriores</em></>, sub: 'de onde você parou' },
    { title: <>Onde <em>quer chegar</em></>, sub: 'além do peso' },
    { title: <>Seu <em>momento</em></>, sub: 'mapa de hoje' },
    { title: <>Como você <em>come</em></>, sub: 'sem julgamento' },
    { title: <><em>Compulsão alimentar</em></>, sub: 'screening (ECAP-adaptada) · só se a investigação anterior pediu' },
    { title: <>Ruído alimentar <em>(food noise)</em></>, sub: 'questionário FNQ validado · 5 itens' },
    { title: <>Seus <em>aparelhos</em></>, sub: 'opcional · pula se quiser' },
    { title: <>Algo <em>mais?</em></>, sub: 'espaço aberto · só se quiser contar' },
    { title: <><em>Pronto</em></>, sub: 'seu caso está em revisão clínica' }
  ];

  const totalSteps = STEPS.length;
  const set = (k, v) => setData(d => ({ ...d, [k]: v }));
  const toggleArr = (k, v) => setData(d => ({ ...d, [k]: d[k].includes(v) ? d[k].filter(x => x !== v) : [...d[k], v] }));
  const togglePastAttempt = (name) => {
    setData(d => {
      if (d.pastAttempts.includes(name)) {
        const newSat = { ...d.pastSatisfaction };
        delete newSat[name];
        return { ...d, pastAttempts: d.pastAttempts.filter(x => x !== name), pastSatisfaction: newSat };
      }
      return { ...d, pastAttempts: [...d.pastAttempts, name], pastSatisfaction: { ...d.pastSatisfaction, [name]: 5 } };
    });
  };
  const setSatisfaction = (name, val) => {
    setData(d => ({ ...d, pastSatisfaction: { ...d.pastSatisfaction, [name]: val } }));
  };

  const validate = () => {
    if (step === 1 && (!data.name.trim() || !data.age)) { showToast('Preenche nome e idade', 'warning'); return false; }
    if (step === 2 && (!data.height || !data.weightCurrent)) { showToast('Preenche altura e peso', 'warning'); return false; }
    return true;
  };

  const bingeRisk = () => {
    const b1 = data.binge?.b1;
    const b2 = data.binge?.b2;
    const b1Pos = b1 === 'às vezes' || b1 === 'frequentemente';
    const b2Pos = b2 === 'sim' || b2 === 'sim, mais que 1x/sem';
    return b1Pos || b2Pos;
  };

  const next = () => {
    if (!validate()) return;
    let nextStep = step + 1;
    // Após fenótipo (9): pula ECAP (10) se screening de compulsão for negativo
    if (step === 9 && !bingeRisk()) nextStep = 11;
    if (nextStep < totalSteps) setStep(nextStep);
  };
  const prev = () => {
    let prevStep = step - 1;
    // De Ruído (11) voltando: pula ECAP (10) se screening negativo
    if (step === 11 && !bingeRisk()) prevStep = 9;
    if (prevStep >= 0) setStep(prevStep);
  };
  const reset = () => { setStep(0); showToast('Onboarding reiniciado'); };

  return (
    <>
      <div className="onb-prog">
        <div className="onb-prog-head">
          <span className="onb-prog-step">Passo {step + 1} de {totalSteps}</span>
          <button className="onb-close" onClick={reset}>×</button>
        </div>
        <div className="onb-prog-track">
          <div className="onb-prog-fill" style={{ width: ((step + 1) / totalSteps * 100) + '%' }}></div>
        </div>
      </div>
      <div className="onb-content">
        {step > 0 && step < totalSteps - 1 && <OnbAck step={step} data={data} />}
        <h1 className="onb-title">{STEPS[step].title}</h1>
        <div className="onb-sub">{STEPS[step].sub}</div>
        {step === 0 && <StepWelcome />}
        {step === 1 && <StepIdentity data={data} set={set} />}
        {step === 2 && <StepBody data={data} set={set} />}
        {step === 3 && <StepHealth data={data} set={set} toggleComorb={(v) => toggleArr('comorbidities', v)} toggleMed={(v) => toggleArr('medClasses', v)} toggleAllergy={(v) => toggleArr('allergyList', v)} />}
        {step === 4 && <StepFamily data={data} toggle={(v) => toggleArr('family', v)} />}
        {step === 5 && <StepHabits data={data} set={set} />}
        {step === 6 && <StepAttempts data={data} set={set} togglePast={togglePastAttempt} setSat={setSatisfaction} />}
        {step === 7 && <StepGoals data={data} toggle={(v) => toggleArr('goals', v)} />}
        {step === 8 && <StepSentiment data={data} setDim={(k, v) => set('sm', { ...data.sm, [k]: v })} />}
        {step === 9 && <StepPhenotype data={data} set={set} setQ={(k, v) => set('pheno', { ...data.pheno, [k]: v })} setBinge={(k, v) => set('binge', { ...data.binge, [k]: v })} />}
        {step === 10 && <StepEcap data={data} setItem={(k, v) => set('ecap', { ...data.ecap, [k]: v })} />}
        {step === 11 && <StepFnq data={data} setItem={(k, v) => set('fnq', { ...data.fnq, [k]: v })} />}
        {step === 12 && <StepDevices data={data} toggle={(v) => toggleArr('devices', v)} />}
        {step === 13 && <StepAnythingElse data={data} set={set} />}
        {step === 14 && <StepFinish data={data} />}
      </div>
      <div className="onb-actions">
        {step > 0 && <button className="onb-btn onb-btn-back" onClick={prev}>Voltar</button>}
        <button className="onb-btn onb-btn-next" onClick={step === totalSteps - 1 ? reset : next}>
          {step === totalSteps - 1 ? 'Ir para minha home →' : 'Continuar'}
        </button>
      </div>
      {toast && <div className={`toast ${toast.kind}`}>{toast.msg}</div>}
    </>
  );
}

function OnbAck({ step, data }) {
  let msg = null;
  if (step === 2 && data.name) {
    msg = <>Prazer em te conhecer, <strong>{data.name.split(' ')[0]}</strong>. Vamos com calma — o que você traz importa.</>;
  } else if (step === 3 && data.weightCurrent && data.height) {
    const imc = (parseFloat(data.weightCurrent) / Math.pow(parseFloat(data.height) / 100, 2)).toFixed(1);
    const cls = imc < 25 ? 'eutrofia' : imc < 30 ? 'sobrepeso' : imc < 35 ? 'obesidade I' : imc < 40 ? 'obesidade II' : 'obesidade III';
    const wMax = parseFloat(data.weightMax) || 0;
    const wNow = parseFloat(data.weightCurrent);
    const diff = wMax - wNow;
    const ageStart = parseInt(data.ageStart) || 0;
    const ageNow = parseInt(data.age) || 0;
    const yrs = ageNow - ageStart;
    let extra = '';
    if (diff > 3) extra = ` Você já está ${diff.toFixed(1)}kg abaixo do seu pico — isso conta.`;
    if (yrs >= 10) extra += ` ${yrs} anos carregando esse peso é tempo demais para ser só "força de vontade".`;
    msg = <><strong>IMC {imc}</strong> · {cls}.{extra} Sua história tem corpo e tempo — vamos respeitar os dois.</>;
  } else if (step === 4) {
    const n = data.comorbidities.length;
    if (n === 0) msg = <>Sem condições prévias. Você chega com um corpo que ainda não foi cobrado caro — é uma janela.</>;
    else if (n <= 2) msg = <><strong>{n} condição{n > 1 ? 'ões' : ''}</strong>. Seu corpo está pedindo atenção. É exatamente o perfil que mais ganha com tratamento — não é tarde.</>;
    else msg = <><strong>{n} condições.</strong> Você carrega muito. A medicação não vai resolver tudo, mas vai aliviar o que sobrecarrega. Promessa nenhuma — só presença.</>;
  } else if (step === 5) {
    const n = data.family.length;
    if (n === 0) msg = <>Sem histórico familiar relatado. Sua história é mais sua do que herdada — isso também é informação.</>;
    else if (n <= 2) msg = <><strong>{n} histórico{n > 1 ? 's' : ''}</strong> na família. Sua biologia carrega esse traço — não é falha sua. É contexto.</>;
    else msg = <><strong>{n} históricos</strong>. Sua família te deu corpo e história. Genética conta entre 40 e 70% do peso — a gente trabalha com isso, não contra.</>;
  } else if (step === 6) {
    const sleep = parseInt(data.sleepHours) || 0;
    const stress = parseInt(data.stress) || 0;
    const sedentary = data.activityFreq === 'sedentária';
    let parts = [];
    if (sleep && sleep < 6) parts.push('sono curto rouba leptina');
    if (stress >= 7) parts.push('cortisol alto convida a comer');
    if (sedentary) parts.push('parado o metabolismo silencia');
    if (parts.length === 0) msg = <>Seu corpo tem boas bases. Vamos preservar isso.</>;
    else msg = <><strong>{parts.join(' · ')}</strong>. Não é caráter — é fisiologia. A gente cuida disso também.</>;
  } else if (step === 7) {
    const attempts = data.pastAttempts;
    const sats = data.pastSatisfaction || {};
    const n = attempts.length;
    if (n === 0) {
      msg = <>Primeira jornada estruturada. Vamos juntas — sem reinventar nada.</>;
    } else {
      const values = attempts.map(a => sats[a] ?? 5);
      const avg = values.reduce((s, v) => s + v, 0) / values.length;
      const lowest = attempts.filter(a => (sats[a] ?? 5) <= 3);
      const lowShort = lowest.map(a => {
        const al = a.toLowerCase();
        if (al.includes('liraglutida')) return 'liraglutida';
        if (al.includes('semaglutida') && al.includes('oral')) return 'semaglutida oral';
        if (al.includes('semaglutida')) return 'semaglutida';
        if (al.includes('tirzepatida')) return 'tirzepatida';
        if (al.includes('bariátrica')) return 'bariátrica';
        if (al.includes('sibutramina')) return 'sibutramina';
        if (al.includes('orlistate')) return 'orlistate';
        if (al.includes('jejum')) return 'jejum';
        if (al.includes('low-carb')) return 'low-carb';
        if (al.includes('vigilantes')) return 'VP';
        if (al.includes('nutricional')) return 'nutri';
        if (al.includes('suplemento')) return 'suplementos';
        if (al.includes('academia')) return 'academia';
        return al.split(' ')[0];
      });
      if (lowest.length > 0) {
        msg = <><strong>{lowest.length} tratamento{lowest.length > 1 ? 's' : ''}</strong> com baixa satisfação ({lowShort.join(' · ')}). Faz sentido você chegar aqui buscando algo diferente — a gente parte daí.</>;
      } else if (avg >= 7) {
        msg = <>Satisfação média <strong>{avg.toFixed(1)}/10</strong>. Você teve resultados — mas algo te trouxe aqui. Vamos descobrir o quê na consulta.</>;
      } else {
        msg = <>Você já tentou <strong>{n} caminho{n > 1 ? 's' : ''}</strong> · satisfação média <strong>{avg.toFixed(1)}/10</strong>. Cada um te ensinou algo. A gente aproveita.</>;
      }
    }
  } else if (step === 8) {
    const n = data.goals.length;
    if (n === 0) msg = <>Você ainda está descobrindo o que quer. Tudo bem — a Dra ajuda a desenhar.</>;
    else if (n <= 2) msg = <><strong>{n} prioridade{n > 1 ? 's' : ''}</strong>. Foco é poder — vamos partir daí.</>;
    else msg = <><strong>{n} prioridades</strong>. Você quer muito, e isso é bonito. A gente também sabe que tudo não cabe de uma vez — vamos sequenciar.</>;
  } else if (step === 9) {
    const sm = data.sm || {};
    const greens = Object.values(sm).filter(v => v === 'green').length;
    const ambers = Object.values(sm).filter(v => v === 'amber').length;
    const reds = Object.values(sm).filter(v => v === 'red').length;
    if (reds === 0 && ambers <= 1) msg = <>Seu mapa chega calmo. Bom ponto de partida — a gente preserva isso.</>;
    else if (reds <= 1) msg = <><strong>{reds + ambers} sinais</strong> de atenção. Você chegou aqui carregando algumas dúvidas. Faz sentido — ninguém procura ajuda sem motivo.</>;
    else msg = <><strong>{reds} vermelho{reds > 1 ? 's' : ''}</strong>. Sua chegada é honesta — você não veio fingindo que está tudo bem. Isso já é cuidado próprio.</>;
  } else if (step === 10) {
    const counts = Object.values(data.pheno || {}).reduce((acc, v) => { acc[v] = (acc[v] || 0) + 1; return acc; }, {});
    const dom = Object.entries(counts).sort((a, b) => b[1] - a[1])[0];
    if (!dom) msg = <>Padrão em construção. A Dra refina contigo.</>;
    else {
      const pattern = dom[0];
      let interp = '';
      if (pattern.includes('emoc') || pattern.includes('ansie') || pattern.includes('culpa') || pattern.includes('belisc')) {
        interp = 'Comer para regular emoção não é fraqueza — é o cérebro buscando alívio onde aprendeu. A medicação ajuda especialmente nisso.';
      } else if (pattern.includes('craving') || pattern.includes('doce') || pattern.includes('estourar')) {
        interp = 'Esse é o tipo de padrão que GLP-1 desliga melhor. A pressão por doce costuma sumir nas primeiras semanas.';
      } else if (pattern.includes('fome')) {
        interp = 'Fome física constante geralmente é sinal de leptina/insulina desreguladas. A medicação age exatamente aí.';
      } else {
        interp = 'Cada padrão tem sua estratégia — a Dra desenha a partir do seu.';
      }
      msg = <>Padrão dominante: <strong>{pattern}</strong>. {interp}</>;
    }
  } else if (step === 11) {
    const hasEcap = Object.keys(data.ecap || {}).length > 0;
    if (hasEcap) {
      const total = Object.values(data.ecap).reduce((s, v) => s + (typeof v === 'number' ? v : 0), 0);
      const cat = total < 14 ? 'sem indicação clínica' : total < 27 ? 'leve a moderada' : 'grave';
      msg = <>ECAP <strong>{total}/48</strong> · {cat}. Anotado — a Dra considera isso na primeira conversa.</>;
    } else {
      msg = <>Screening de compulsão não detectou padrão clínico. Seguimos.</>;
    }
  } else if (step === 12) {
    const fnqTotal = Object.values(data.fnq || {}).reduce((s, v) => s + (typeof v === 'number' ? v : 0), 0);
    const answered = Object.keys(data.fnq || {}).length;
    if (answered === 0) {
      msg = <>FNQ ainda não respondido — você pode voltar se quiser.</>;
    } else {
      const cat = fnqTotal <= 5 ? 'baixo' : fnqTotal <= 10 ? 'moderado' : fnqTotal <= 15 ? 'alto' : 'muito alto';
      msg = <>Ruído alimentar (FNQ) <strong>{fnqTotal}/20</strong> · {cat}. Esse é o número que a gente vai acompanhar ao longo do tempo.</>;
    }
  } else if (step === 13) {
    const n = (data.devices || []).length;
    if (n === 0) msg = <>Sem aparelhos selecionados. A equipe trabalha com o que você tiver.</>;
    else msg = <><strong>{n} aparelho{n > 1 ? 's' : ''}</strong> · vai começar a alimentar o painel da equipe assim que conectar.</>;
  }
  if (!msg) return null;
  return (
    <div className="onb-ack">
      <div className="onb-ack-icon">💬</div>
      <div className="onb-ack-msg">{msg}</div>
    </div>
  );
}
